<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ストレスチェック 詳細結果</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
  background: #FAFAF9;
  color: #1a1a2e;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Layout ── */
.wrap {
  max-width: 800px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}

/* ── Loading / Error ── */
.state-msg {
  text-align: center;
  padding: 80px 20px;
  color: #999;
  font-size: .9rem;
  line-height: 2;
}
.state-link {
  display: inline-block;
  margin-top: 16px;
  color: #5DCAA5;
  font-weight: 700;
  text-decoration: none;
}

/* ── Judgment Card ── */
.judgment-card {
  border-radius: 14px;
  border: 1px solid;
  padding: 24px 28px;
  margin-bottom: 20px;
}
.judgment-badge {
  display: inline-block;
  color: #fff;
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .1em;
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 10px;
}
.judgment-label {
  font-size: 1.25rem;
  font-weight: 700;
  margin-bottom: 10px;
}
.judgment-advice {
  font-size: .87rem;
  line-height: 1.9;
  white-space: pre-line;
}

/* ── Category Section ── */
.cat-section {
  background: #fff;
  border-radius: 12px;
  border: 1px solid #e0ddd6;
  margin-bottom: 16px;
  overflow: hidden;
}
.cat-header {
  padding: 16px 20px 12px;
  border-left: 4px solid;
  border-bottom: 1px solid #f0ede6;
}
.cat-title {
  font-size: .98rem;
  font-weight: 700;
  margin-bottom: 5px;
}
.cat-desc {
  font-size: .8rem;
  color: #666;
  line-height: 1.75;
}
.cat-body {
  padding: 8px 20px 16px;
}

/* ── Scale Row ── */
.scale-row {
  display: flex;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid #f5f3ef;
}
.scale-row:last-child {
  border-bottom: none;
  padding-bottom: 0;
}
.scale-left {
  flex: 0 0 50%;
  min-width: 0;
  padding-right: 8px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.scale-right {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.scale-name {
  font-size: .86rem;
  font-weight: 600;
  margin-bottom: 3px;
  overflow-wrap: break-word;
}
.scale-desc-text {
  font-size: .71rem;
  color: #999;
  line-height: 1.55;
}

/* ── Bar ── */
.bar-header {
  display: flex;
  justify-content: space-between;
  font-size: .63rem;
  color: #bbb;
  margin-bottom: 5px;
}
.bar-track {
  position: relative;
  height: 10px;
  background: #f0ede6;
  border-radius: 5px;
  overflow: hidden;
  margin-bottom: 5px;
}
.bar-fill {
  height: 100%;
  border-radius: 5px;
  transition: width .4s ease;
}
.bar-midline {
  position: absolute;
  top: 0;
  left: 50%;
  width: 2px;
  height: 100%;
  background: rgba(26, 26, 46, 0.22);
  transform: translateX(-50%);
  pointer-events: none;
}
.bar-value {
  font-size: .8rem;
  font-weight: 700;
  text-align: right;
}

/* ── Alert Cards ── */
.alert-card {
  border-radius: 12px;
  border: 1px solid;
  padding: 18px 22px;
  margin-bottom: 16px;
}
.alert-title {
  font-size: .94rem;
  font-weight: 700;
  margin-bottom: 7px;
}
.alert-body {
  font-size: .84rem;
  line-height: 1.85;
}
.alert-danger {
  background: #FCEBEB;
  border-color: #F09595;
}
.alert-danger .alert-title { color: #B53535; }
.alert-danger .alert-body  { color: #7A2C2C; }
.alert-warning {
  background: #FFF8E6;
  border-color: #F0C85A;
}
.alert-warning .alert-title { color: #7A5900; }
.alert-warning .alert-body  { color: #5C4200; }

/* ── Print ── */
@media print {
  body { background: #fff; }
  .cat-section { break-inside: avoid; }
  .judgment-card { break-inside: avoid; }
  .alert-card { break-inside: avoid; }
  .scale-row { break-inside: avoid; }
  @page { margin: 14mm; }

  /* バーの背景・塗りを印刷時も表示 */
  .bar-track,
  .bar-fill {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* 全ての背景色・ボーダーカラーを印刷時も表示 */
  * {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
}

/* ── Mobile ── */
@media (max-width: 500px) {
  .scale-row { flex-direction: column; gap: 6px; }
  .scale-left { flex: unset; width: 100%; padding-right: 0; }
}
</style>
</head>
<body>

<div id="root">
  <div class="state-msg">読み込み中...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/scoring.js"></script>
<script>
(async function () {
  'use strict';

  const root = document.getElementById('root');

  /* ── helpers ── */
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function barColor(d) {
    if (d > 55) return '#E24B4A';
    if (d >= 50) return '#EF9F27';
    return '#1D9E75';
  }

  function renderBar(scale) {
    const pct   = scale.displayDev.toFixed(1);
    const color = barColor(scale.displayDev);
    return `
      <div class="scale-row">
        <div class="scale-left">
          <div class="scale-name">${esc(scale.name)}</div>
          ${scale.desc ? `<div class="scale-desc-text">${esc(scale.desc)}</div>` : ''}
        </div>
        <div class="scale-right">
          <div class="bar-header">
            <span>← 良好</span><span>50</span><span>要注意 →</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
            <div class="bar-midline"></div>
          </div>
          <div class="bar-value" style="color:${color}">${pct}</div>
        </div>
      </div>`;
  }

  function renderSection(title, desc, scales, accentColor) {
    if (!scales.length) return '';
    return `
      <div class="cat-section">
        <div class="cat-header" style="border-left-color:${accentColor}">
          <div class="cat-title">${title}</div>
          <div class="cat-desc">${desc}</div>
        </div>
        <div class="cat-body">
          ${scales.map(renderBar).join('')}
        </div>
      </div>`;
  }

  /* ── main ── */
  try {
    const stressResult = JSON.parse(sessionStorage.getItem('stressResult') || '{}');
    const answers      = stressResult.answers    || {};
    const deviations   = stressResult.deviations || {};

    if (!Object.keys(stressResult).length) {
      root.innerHTML = `
        <div class="state-msg">
          結果データが見つかりません。<br>
          <a class="state-link" href="index.html">← チェックを受ける</a>
        </div>`;
      return;
    }

    const master = await loadMaster();

    /* スケールメタ情報インデックス */
    const scalesMeta = {};
    master.scales.forEach(function (s) {
      scalesMeta[cleanScaleName(s.scale_name)] = s;
    });

    /* 表示用データ生成 */
    const HARASSMENT = '職場のハラスメント';
    const allScales = [];

    for (const k in deviations) {
      const d    = deviations[k];
      const meta = scalesMeta[k] || {};
      const displayDev = 100 - d.dev;
      allScales.push({
        name:       k,
        dev:        d.dev,
        displayDev: Math.min(100, Math.max(0, displayDev)),
        largeCat:   meta.large_category || '',
        desc:       meta.description     || ''
      });
    }

    /* カテゴリ振り分け */
    const groups = { stress: [], stressor: [], resource: [], outcome: [] };

    allScales.forEach(function (s) {
      if (s.name === HARASSMENT || s.largeCat === 'ストレッサー') {
        groups.stressor.push(s);
      } else if (s.largeCat === 'ストレス') {
        groups.stress.push(s);
      } else if (s.largeCat === 'リソース') {
        groups.resource.push(s);
      } else if (s.largeCat === 'やりがいと満足') {
        groups.outcome.push(s);
      }
    });

    /* 要注意順ソート（displayDev 降順） */
    Object.values(groups).forEach(function (g) {
      g.sort(function (a, b) { return b.displayDev - a.displayDev; });
    });

    /* 身体愁訴チェック（Q38〜Q48 の生番号が 1） */
    const COMPLAINTS = {
      38: 'めまい',
      39: '体のふしぶしの痛み',
      40: '頭痛・頭重感',
      41: '首筋・肩こり',
      42: '腰痛',
      43: '目の疲れ',
      44: '動悸・息切れ',
      45: '胃腸の不調',
      46: '食欲不振',
      47: '便秘・下痢',
      48: '不眠'
    };
    const getAns = function (q) {
      const v = answers[q];
      return v !== undefined ? v : answers[String(q)];
    };
    const symptoms = Object.entries(COMPLAINTS)
      .filter(function (e) { return getAns(Number(e[0])) == 4; })
      .map(function (e) { return e[1]; });

    /* ハラスメントチェック（Q126・Q127 の生番号が 1 または 2） */
    const hasHarassment = [126, 127].some(function (q) {
      const v = getAns(q);
      return v == 1 || v == 2;
    });

    /* ── 描画 ── */
    const isHigh   = stressResult.level === 'high';
    const jBg      = isHigh ? '#FCEBEB' : '#E1F5EE';
    const jBorder  = isHigh ? '#F09595' : '#5DCAA5';
    const jBadgeBg = isHigh ? '#E24B4A' : '#5DCAA5';
    const jTextCol = isHigh ? '#A32D2D' : '#0F6E56';
    const jBadge   = isHigh ? '高ストレス' : '適応状態';
    const jLabel   = stressResult.label  || jBadge;
    const jAdvice  = stressResult.advice || '';
    const jReaction   = stressResult.stress_reaction || '';
    const jEnv        = stressResult.environment     || '';

    let html = `<div class="wrap">`;

    /* 第1層：判定カード */
    html += `
      <div class="judgment-card" style="background:#fff;border-color:${jBorder}">
        <div class="judgment-badge" style="background:${jBadgeBg}">${jBadge}</div>
        <div class="judgment-label">${esc(jLabel)}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0">
          <div style="background:#f5f5f3;border-radius:8px;padding:10px 14px">
            <div style="font-size:0.72rem;color:${jTextCol};font-weight:700;margin-bottom:4px">ストレス反応</div>
            <div style="font-size:0.9rem;font-weight:600">${esc(jReaction)}</div>
          </div>
          <div style="background:#f5f5f3;border-radius:8px;padding:10px 14px">
            <div style="font-size:0.72rem;color:${jTextCol};font-weight:700;margin-bottom:4px">職場環境（ストレッサー＋リソース）</div>
            <div style="font-size:0.9rem;font-weight:600">${esc(jEnv)}</div>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;background:${jBg};border:1px solid ${jBorder};border-radius:8px;padding:10px 16px;margin-bottom:14px">
          <span style="font-size:0.8rem;color:${jTextCol};font-weight:700">総合判定</span>
          <span style="font-size:0.9rem;font-weight:700;color:${jTextCol}">${isHigh ? '高ストレス' : '適応状態'}</span>
        </div>
        ${jAdvice ? `<div class="judgment-advice">${esc(jAdvice)}</div>` : ''}
      </div>`;

    /* 第2層：ストレス反応 */
    html += renderSection(
      'ストレス反応',
      '仕事の負担やリソースの状態が、心身にどう現れているかを示します。精神的な反応が高まっているときは早めのケアが大切です。身体愁訴は、ストレスが長引いた後に現れやすいサインです。',
      groups.stress, '#7F77DD'
    );

    /* 第3層：身体愁訴アラート */
    if (symptoms.length > 0) {
      html += `
        <div class="alert-card alert-danger" style="background:#fff">
          <div class="alert-title">自覚的な身体症状があります</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 14px">
            ${symptoms.map(s => `<div style="background:#FCEBEB;color:#A32D2D;font-size:12px;padding:6px 14px;border-radius:20px;white-space:nowrap">${esc(s)}</div>`).join('')}
          </div>
          <div class="alert-body" style="border-top:0.5px solid var(--color-border-tertiary);padding-top:10px">
            日常的にあると回答した項目です。症状が続く場合は、医療機関への相談をおすすめします。
          </div>
        </div>`;
    }

    /* 第4層：ストレッサー */
    html += renderSection(
      'ストレッサー',
      '仕事で感じる負担の大きさを示します。負担が続くとストレス反応につながりやすくなります。',
      groups.stressor, '#F0997B'
    );

    /* 第5層：ハラスメントアラート */
    if (hasHarassment) {
      html += `
        <div class="alert-card alert-warning">
          <div class="alert-title">ハラスメントリスクを感じています</div>
          <div class="alert-body">ハラスメント（いじめ・嫌がらせ・パワハラ・セクハラ）はストレッサーの一種ですが、ストレス反応へ直接・強く影響します。リソースによる緩和も受けにくいため、一人で抱え込まず、信頼できる人や社内外の相談窓口への相談をおすすめします。</div>
        </div>`;
    }

    /* 第6層：リソース */
    html += renderSection(
      'リソース',
      'ストレスを和らげ、やりがいや満足度を高める職場環境の強さを示します。リソースが充実しているほど、高い負担の下でも心身の健康が保たれやすくなります。',
      groups.resource, '#5DCAA5'
    );

    /* 第7層：やりがい・満足度 */
    html += renderSection(
      'やりがい・満足度',
      'リソースの充実が、やりがいや満足度として現れた結果を示します。「負担を減らす」だけでなく「リソースを増やす」ことが、仕事への充実感や成果につながります。',
      groups.outcome, '#378ADD'
    );

    /* フッター：受検日・セッションID */
    const _footerParts = [];
    if (stressResult.created_at) {
      const _date = new Date(stressResult.created_at).toLocaleDateString('ja-JP', {
        timeZone: 'Asia/Tokyo',
        year: 'numeric', month: '2-digit', day: '2-digit'
      }).replace(/\//g, '/');
      _footerParts.push(`受検日：${esc(_date)}`);
    }
    if (stressResult.session_id) {
      _footerParts.push(`セッションID：${esc(stressResult.session_id)}`);
    }
    if (_footerParts.length) {
      html += `<div style="font-size:0.75rem;color:#bbb;text-align:center;padding:16px 0 8px">${_footerParts.join('<br>')}</div>`;
    }

    html += `</div>`;
    root.innerHTML = html;

  } catch (err) {
    console.error(err);
    root.innerHTML = `
      <div class="state-msg">
        データの読み込みに失敗しました。<br>
        <small style="color:#bbb">${esc(err && err.message ? err.message : String(err))}</small><br>
        <a class="state-link" href="index.html">← 最初からやり直す</a>
      </div>`;
  }

}());
</script>
</body>
</html>
