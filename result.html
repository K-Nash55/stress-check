<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ストレスチェック 詳細結果</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

:root {
  --coral: #F0997B;
  --teal: #5DCAA5;
  --purple: #7F77DD;
  --danger: #E24B4A;
  --ink: #1a1a2e;
  --ink2: #4a4a6a;
  --paper: #faf9f6;
  --warm: #f3f0e8;
  --border: #d6d0c4;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--paper); color: var(--ink); line-height: 1.7; }

.wrap { max-width: 780px; margin: 0 auto; padding: 20px 16px 60px; }

/* ── ヘッダー ── */
.r-header { text-align: center; padding: 28px 20px 20px; }
.r-badge { display: inline-block; padding: 6px 20px; border-radius: 24px; font-size: .75rem; font-weight: 700; letter-spacing: .1em; margin-bottom: 12px; }
.r-badge.low  { background: #d8f3dc; color: #2d6a4f; }
.r-badge.mid  { background: #fff3e0; color: #c77c3e; }
.r-badge.high { background: #fde8e8; color: #b5373a; }
.r-title    { font-size: 1.55rem; font-weight: 700; margin-bottom: 6px; }
.r-subtitle { font-size: .83rem; color: var(--ink2); }

/* ── 高ストレスアラート ── */
.high-alert { background: #fde8e8; border: 2px solid #f5a5a7; border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; }
.high-alert-title { font-weight: 700; color: #b5373a; margin-bottom: 6px; }
.high-alert-desc  { font-size: .83rem; color: #7a2c2e; line-height: 1.8; }

/* ── 凡例 ── */
.legend { display: flex; gap: 10px; margin: 16px 0; }
.legend-card { flex: 1; background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; text-align: center; }
.legend-dot  { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
.legend-top  { display: flex; align-items: center; gap: 6px; justify-content: center; margin-bottom: 2px; }
.legend-name { font-size: .78rem; font-weight: 700; }
.legend-lbl  { font-size: .68rem; color: var(--ink2); }

/* ── セクションカード ── */
.section { background: #fff; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 14px; overflow: hidden; }
.sec-stressor { border-left: 4px solid var(--coral); }
.sec-resource { border-left: 4px solid var(--teal); }
.sec-outcome  { border-left: 4px solid var(--purple); }
.sec-hazard   { border-left: 4px solid var(--danger); }

.sec-head { display: flex; align-items: center; gap: 12px; padding: 16px 20px 10px; }

/* バッジ：ピル形状で①②-1③-1⚠に対応 */
.badge-num {
  height: 26px; min-width: 26px; border-radius: 13px; padding: 0 7px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 700; color: #fff; flex-shrink: 0;
  letter-spacing: 0;
}

.sec-title { font-size: .98rem; font-weight: 700; }
.sec-body  { padding: 0 20px 18px; }

/* ── カテゴリ解説文 ── */
.sec-cat-desc {
  font-size: .8rem; color: var(--ink2); line-height: 1.75;
  background: var(--warm); border-radius: 8px; padding: 9px 13px;
  margin-bottom: 14px;
}

/* ── スケール行（ストレッサー個別） ── */
.scale-row { margin-bottom: 16px; }
.scale-row-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 3px; }
.scale-name { font-size: .85rem; font-weight: 500; }
.scale-dev  { font-size: .78rem; font-weight: 700; }
.scale-desc { font-size: .71rem; color: var(--ink2); margin-top: 3px; line-height: 1.5; }

/* ── 棒グラフ ── */
.bar-dir { display: flex; justify-content: space-between; font-size: .65rem; color: var(--ink2); margin-bottom: 2px; }

/* グループバー：値を右端に小さく添える */
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-row .bar-wrapper { flex: 1; }
.bar-dev-val { font-size: .78rem; font-weight: 700; min-width: 34px; text-align: right; flex-shrink: 0; }

.bar-wrapper { position: relative; margin: 2px 0 4px; }
.bar-track { height: 8px; background: var(--warm); border-radius: 4px; overflow: hidden; }
.bar-fill  { height: 100%; border-radius: 4px; transition: width .4s ease; }
.bar-avg-line {
  position: absolute; top: -4px; left: 50%; width: 2px; height: 16px;
  background: rgba(26,26,46,0.35); border-radius: 1px;
  transform: translateX(-50%); pointer-events: none;
}
.bar-nat-note { font-size: .64rem; color: var(--ink2); margin-top: 2px; }

/* ── 強み・課題カード ── */
.bw-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.bw-card  { border-radius: 10px; padding: 12px 14px; }
.bw-card.best  { background: #E6F1FB; border: 1px solid #b5d3f5; }
.bw-card.worst { background: #FCEBEB; border: 1px solid #f5b5b5; }
.bw-card.none  { background: #f5f4f1; border: 1px dashed var(--border); }
.bw-card-lbl   { font-size: .63rem; font-weight: 700; letter-spacing: .06em; color: var(--ink2); margin-bottom: 4px; }
.bw-card-name  { font-size: .85rem; font-weight: 700; }
.bw-card-dev   { font-size: .73rem; color: var(--ink2); margin-top: 2px; }

/* ── 身体愁訴・ハラスメント 説明文 ── */
.sec-desc {
  font-size: .82rem; color: var(--ink2); line-height: 1.8; margin-bottom: 12px;
  background: var(--warm); border-radius: 8px; padding: 10px 14px;
}

/* ── ボタン ── */
.actions { display: flex; gap: 12px; justify-content: center; margin: 28px 0 16px; flex-wrap: wrap; }
.btn {
  padding: 12px 24px; border-radius: 8px; border: 2px solid var(--border); background: #fff;
  font-family: 'Noto Sans JP', sans-serif; font-size: .86rem; font-weight: 700;
  cursor: pointer; transition: all .2s; color: var(--ink);
}
.btn:hover { background: var(--warm); }
.btn.primary { background: var(--teal); color: #fff; border-color: var(--teal); }
.btn.primary:hover { background: #3db88a; }

/* ── 免責 ── */
.disclaimer {
  font-size: .72rem; color: #999; text-align: center; line-height: 1.8;
  padding: 14px 16px; border: 1px dashed #ddd; border-radius: 8px; margin-top: 8px;
}

.bw-card-desc { font-size: .71rem; color: var(--ink2); margin-top: 4px; line-height: 1.6; }

.jdr-section { margin: 24px 0; }
.jdr-diagram-wrap { width: 100%; margin-bottom: 16px; }
.jdr-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.jdr-card { border-radius: 8px; padding: 10px 13px; font-size: 12px; line-height: 1.7; }
.jdr-card strong { display: block; font-size: 12px; font-weight: 600; margin-bottom: 3px; }
.jdr-card--coral { background: #FDF1EE; }
.jdr-card--coral strong { color: #993C1D; }
.jdr-card--teal  { background: #EEF9F4; }
.jdr-card--teal strong  { color: #0F6E56; }
.jdr-card--red   { background: #FDF1F1; }
.jdr-card--red strong   { color: #A32D2D; }
.jdr-card--blue  { background: #EEF5FD; }
.jdr-card--blue strong  { color: #185FA5; }
.jdr-card--purple { background: #F3F2FE; }
.jdr-card--purple strong { color: #534AB7; }
.jdr-card-full { border-radius: 8px; padding: 10px 13px; font-size: 12px; line-height: 1.7; margin-top: 10px; }
.jdr-card-full strong { display: block; font-size: 12px; font-weight: 600; margin-bottom: 3px; }
.jdr-card-full.jdr-card--blue { background: #EEF5FD; }
.jdr-card-full.jdr-card--blue strong { color: #185FA5; }
.jdr-source { font-size: 11px; color: #aaa; text-align: right; margin: 0; }

.category-header { border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; }
.category-header__label { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.category-header__desc { font-size: 13px; line-height: 1.75; margin: 0; }
.category-header--teal { background: #EEF9F4; }
.category-header--teal .category-header__label { color: #0F6E56; }
.category-header--teal .category-header__desc  { color: #0F6E56; }
.category-header--red { background: #FDF1F1; }
.category-header--red .category-header__label { color: #A32D2D; }
.category-header--red .category-header__desc  { color: #A32D2D; }

@media (max-width: 480px) {
  .bw-cards { grid-template-columns: 1fr; }
  .legend   { flex-direction: column; }
  .jdr-cards { grid-template-columns: 1fr; }
}

@media print {
  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  .actions { display: none !important; }
  body { background: #fff; }
  .section { break-inside: avoid; }
  @page { margin: 14mm; }

  .jdr-harassment { page-break-inside: avoid; }
  .category-header { page-break-inside: avoid; page-break-before: avoid; }
  .jdr-cards { page-break-inside: avoid; }
}
</style>
</head>
<body>
<div class="wrap" id="root">
  <div style="text-align:center;padding:60px 20px;color:#999">読み込み中...</div>
</div>
<script src="js/scoring.js"></script>
<script>
(function () {
  // ── カラー定数 ──
  var C = {
    coral:'#F0997B', teal:'#5DCAA5', purple:'#7F77DD', danger:'#E24B4A',
    blue:'#378ADD', yellow:'#EF9F27', red:'#E24B4A'
  };

  // ── ヘルパー ──
  function colorHex(c) { return C[c]; }

  function avgOfDevs(scales) {
    if (!scales.length) return 50;
    var sum = scales.reduce(function(s, x) { return s + x.dev; }, 0);
    return Math.round(sum / scales.length * 10) / 10;
  }

  function getBestWorst(scales, negHigh) {
    if (!scales.length) return { best: null, worst: null };
    var best = negHigh
      ? scales.reduce(function(a, b) { return a.dev < b.dev ? a : b; })
      : scales.reduce(function(a, b) { return a.dev > b.dev ? a : b; });
    var worst = negHigh
      ? scales.reduce(function(a, b) { return a.dev > b.dev ? a : b; })
      : scales.reduce(function(a, b) { return a.dev < b.dev ? a : b; });
    return { best: best, worst: worst };
  }

  // ── HTML パーツ ──

  // 個別スケール用バー（方向ラベル + バー。偏差値は呼び出し側で表示）
  function barHTML(dev, negHigh) {
    var c   = colorHex(getDevColor(dev, negHigh));
    var pct = Math.min(100, Math.max(0, dev));
    var lft = negHigh ? '← 良好' : '← 要注意';
    var rgt = negHigh ? '要注意 →' : '良好 →';
    return '<div class="bar-dir"><span>' + lft + '</span><span>' + rgt + '</span></div>'
      + '<div class="bar-wrapper">'
      +   '<div class="bar-track">'
      +     '<div class="bar-fill" style="width:' + pct + '%;background:' + c + '"></div>'
      +   '</div>'
      +   '<div class="bar-avg-line"></div>'
      + '</div>';
  }

  // グループ用バー（方向ラベル + バー右端に偏差値 + 下に注記）
  function groupBarHTML(dev, negHigh) {
    var c   = colorHex(getDevColor(dev, negHigh));
    var pct = Math.min(100, Math.max(0, dev));
    var lft = negHigh ? '← 良好' : '← 要注意';
    var rgt = negHigh ? '要注意 →' : '良好 →';
    return '<div class="bar-dir"><span>' + lft + '</span><span>' + rgt + '</span></div>'
      + '<div class="bar-row">'
      +   '<div class="bar-wrapper">'
      +     '<div class="bar-track">'
      +       '<div class="bar-fill" style="width:' + pct + '%;background:' + c + '"></div>'
      +     '</div>'
      +     '<div class="bar-avg-line"></div>'
      +   '</div>'
      +   '<span class="bar-dev-val" style="color:' + c + '">' + dev.toFixed(1) + '</span>'
      + '</div>'
      + '<div class="bar-nat-note">全国平均=50（縦線が全国平均）</div>';
  }

  function bwCardsHTML(scales, negHigh, descMap) {
    if (!scales || !scales.length) return '';
    var bw    = getBestWorst(scales, negHigh);
    var best  = bw.best;
    var worst = bw.worst;
    function cardExtra(s) {
      if (!descMap || !s) return '';
      var desc = descMap[s.name] || '';
      if (!desc) return '';
      var diff = Math.round((s.dev - 50) * 10) / 10;
      var diffStr = (diff >= 0 ? '+' : '') + diff.toFixed(1) + 'pt';
      var sep = (desc.slice(-1) === '。') ? '' : '。';
      return '<div class="bw-card-desc">' + desc + sep + '全国平均より' + diffStr + '。</div>';
    }
    var bestCard = best
      ? '<div class="bw-card best"><div class="bw-card-lbl">強み</div>'
          + '<div class="bw-card-name">' + best.name + '</div>'
          + '<div class="bw-card-dev">偏差値 ' + best.dev.toFixed(1) + '</div>'
          + cardExtra(best) + '</div>'
      : '<div class="bw-card none"><div class="bw-card-lbl">強み</div>'
          + '<div class="bw-card-name" style="color:#aaa">強みはありませんでした</div></div>';
    var worstCard = worst
      ? '<div class="bw-card worst"><div class="bw-card-lbl">課題</div>'
          + '<div class="bw-card-name">' + worst.name + '</div>'
          + '<div class="bw-card-dev">偏差値 ' + worst.dev.toFixed(1) + '</div>'
          + cardExtra(worst) + '</div>'
      : '<div class="bw-card none"><div class="bw-card-lbl">課題</div>'
          + '<div class="bw-card-name" style="color:#aaa">課題はありませんでした</div></div>';
    return '<div class="bw-cards">' + bestCard + worstCard + '</div>';
  }

  function catDescHTML(text) {
    return '<div class="sec-cat-desc">' + text + '</div>';
  }

  function sectionWrap(colorClass, badgeColor, badgeText, title, body) {
    return '<div class="section ' + colorClass + '">'
      + '<div class="sec-head">'
      +   '<div class="badge-num" style="background:' + badgeColor + '">' + badgeText + '</div>'
      +   '<div class="sec-title">' + title + '</div>'
      + '</div>'
      + '<div class="sec-body">' + body + '</div>'
      + '</div>';
  }

  // ── スケール解説文 ──
  var SCALE_DESC_RESOURCE = {
    '仕事のコントロール': '仕事の内容や予定や手順などを自分で決められる程度のこと。仕事の負担の高い状況とコントロール度の低い状況とが重なるとストレス度が高くなる。',
    '技能の活用度': '持っている技術、知識、技能、資格などが仕事上活用されていること。',
    '仕事の適性': '仕事の内容が自分に向いている、合っていること。',
    '仕事の意義': '仕事の意義が認識でき、働きがいを感じていること。',
    '役割明確さ': '仕事の上で果たすべき役割が明確に理解されていること。',
    '成長の機会': '仕事の中で、知識や技術を得たり、その他の自己成長の機会があること。',
    '新奇性': '仕事の中で新しいことや変化に富んだ経験ができる程度。新奇性の高い仕事は認知的刺激をもたらし、内発的動機づけやエンゲージメントを高める要因とされています。',
    '予測可能性': '職場や仕事の将来について、ある程度見通しが持てる状態。不確実性や曖昧さが低いほど心理的安全感が高まり、慢性的なストレスの軽減につながることが示されています。',
    'WSBポジティブ': '仕事から得たものにより、個人生活を豊かにすることができる風土や方針があること。',
    '上司からのサポート': '上司が話しかけやすく、頼りになり、相談にのってくれるなど上司が部下に行う支援。',
    '同僚からのサポート': '同僚が話しをしやすく、頼りになり、相談にのってくれるなど同僚同士での支援。',
    '家族・友人からのサポート': '配偶者、家族、友人等から受けられる支援。',
    '経済・地位報酬': '仕事上の努力や達成度に対し金銭的あるいは処遇を適切に受けていること。尊重報酬、安定報酬とともに仕事の三大報酬の１つ。',
    '尊重報酬': '上司や同僚から、仕事上の努力や達成度にふさわしい尊敬や処遇を受けていること。',
    '安定報酬': '仕事が不安定であり、将来の見込みがないなど、職を失う可能性のあること（低いほど良好）。',
    '上司のリーダーシップ': '上司が、仕事の出来について適切なフィードバックを行い、部下の能力発揮を助け、自ら問題解決できるよう指導していること。',
    '上司の公正な態度': '上司が、偏見を持ったり独りよがりだったりせず、部下に思いやりと誠実さを持って対応してくれること。',
    'ほめてもらえる職場': '業務の結果に対して、上司や同僚からのねぎらいや感謝の言葉など、ポジティブな評価を受けることができる雰囲気が職場にあること。',
    '失敗を認める職場': '仕事上で失敗しても、それを取り戻す機会があったり、失敗を転じて成功に導くことができる雰囲気が職場にあること。',
    'グループの有能感': '自分が所属するチームや部署全体が、仕事をうまくこなせているという集合的な自己効力感。チームの有能感が高いほど個人のモチベーションと職場のパフォーマンスが向上することが示されています。',
    '経営層との信頼関係': '経営層と従業員の間に相互の信頼関係があること。',
    '変化への対応': '職場や仕事でどんな変化があるか説明があったり、たずねることができたりと、変化がある際の準備が組織的にできていること。',
    '手続きの公正性': '意思決定や人事評価などの手続きが公平・透明に行われているという認識。手続きの公正性は組織への信頼感や従業員の精神的健康に強く関連することが報告されています。',
    '個人の尊重': '一人ひとりの長所や得意分野、価値観などを考えて仕事が与えられる風土や方針があること。',
    '公正な人事評価': '人事評価の方針、基準について情報が提供され、個別の人事評価結果について納得できる説明がなされる風土や方針があること。',
    '多様な労働者への対応': '女性、高齢者、若年者、雇用形態別のさまざまな従業員が職場の一員として尊重される風土や方針があること。',
    'キャリア形成': '従業員のキャリアについて、人事方針や目標が明確にされ、教育・訓練が提供されていること。'
  };

  var SCALE_DESC_MENTAL = {
    '活気':    '活気、元気、いきいきなどのポジティブな感情。活気のみ高いほど良好なスケールです',
    'イライラ感': '怒り、立腹、イライラなどの症状',
    '疲労感':  '疲れ、へとへと、だるさなどの疲労に関連した症状',
    '不安感':  '気がはりつめている、不安、落ち着かないなどの不安に関する症状',
    '抑うつ感': '憂うつ感、おっくうさ、集中力の低下など、気分と気力の低下に関する症状'
  };

  var SCALE_DESC_OUTCOME = {
    '仕事満足度': '仕事に関する全般的な満足度。',
    '家庭満足度': '家庭生活に関する全般的な満足度。',
    '職場の一体感': '職場のメンバーが情報共有、相互理解や信頼、助け合いの気持ちをもって業務を遂行している状態。',
    'ワーク・エンゲイジメント': '仕事から活力を得て、仕事に誇りを感じ、従業員がいきいきと仕事をしている状態。',
    '職務の遂行': '自分に課された業務や役割を、期待される水準で達成できている程度。職務遂行能力はワーク・エンゲイジメントや職業的自己効力感と正の関連があり、リソースの充実によって向上することが示されています。',
    '創造性の発揮': '仕事の中で新しいアイデアを生み出したり、独自の方法で問題を解決できている程度。心理的安全性や自律性などの職場リソースが創造性を促進することが示されています。',
    '積極的な学習': '仕事を通じて新しい知識・スキルを自発的に習得しようとする行動傾向。学習行動はワーク・エンゲイジメントの高さと関連し、成長の機会や心理的安全性によって促進されます。'
  };

  // ── JD-Rモデル図解HTML ──
  var JDR_HTML = '<div class="jdr-section">'
    + '<div class="jdr-diagram-wrap">'
    + '<svg width="100%" viewBox="0 0 680 360">'
    + '<defs>'

    + '<text font-size="11" fill="#534AB7" x="90" y="210" text-anchor="middle">パワハラ・セクハラ</text>'
    + '<line x1="90" y1="125" x2="90" y2="146" stroke="#7F77DD" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>'

    + '<text font-size="11" fill="#0F6E56" x="90" y="282" text-anchor="middle">②</text>'
    + '<text font-size="13" font-weight="500" fill="#0F6E56" x="90" y="302" text-anchor="middle">リソース</text>'
    + '<text font-size="11" fill="#0F6E56" x="90" y="322" text-anchor="middle">周囲のサポート</text>'

    + '<text font-size="11" fill="#A32D2D" x="300" y="60" text-anchor="middle">③-1</text>'
    + '<text font-size="13" font-weight="500" fill="#A32D2D" x="300" y="80" text-anchor="middle">ストレス反応</text>'

    + '<text font-size="11" fill="#185FA5" x="300" y="282" text-anchor="middle">③-3</text>'
    + '<text font-size="13" font-weight="500" fill="#185FA5" x="300" y="302" text-anchor="middle">アウトカム</text>'

    + '<text font-size="13" font-weight="500" fill="#3B6D11" x="505" y="295" text-anchor="middle">成果</text>'
    + '<text font-size="11" fill="#3B6D11" x="505" y="315" text-anchor="middle">高業績・組織貢献</text>'

    + '<line x1="160" y1="303" x2="228" y2="303" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>'
    + '<line x1="370" y1="303" x2="438" y2="303" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>'
    + '<path d="M160 262 Q230 190 248 108" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="5 3" opacity="0.7" marker-end="url(#arrow)"/>'

    + '</svg>'
    + '</div>'
    + '<div class="jdr-cards">'
    + '<div class="jdr-card jdr-card--coral"><strong>① ストレッサーとは</strong>業務過多や職場の人間関係の難しさが代表的な「ストレッサー」です。高い状態が続くと「ストレス反応」として現れます。</div>'
    + '<div class="jdr-card jdr-card--teal"><strong>② リソースには2つの働きがある</strong>上司・同僚のサポートなどの「リソース」は、「アウトカム」を直接高めると同時に、「ストレス反応」を緩和します（破線）。</div>'
    + '<div class="jdr-card jdr-card--red"><strong>③ ストレス反応→身体愁訴への進行に注意</strong>「ストレス反応」は心理的なサインです。そのスコアが高い場合は、「身体愁訴」への移行を防ぐ早めの対処が重要です。</div>'
    + '<div class="jdr-card jdr-card--purple"><strong>⚠ ハラスメントリスクについて</strong>「ハラスメント」は心理的ダメージが深く、目撃するだけでも「ストレス反応」へ直接・強く影響します。「リソース」による緩和も受けにくい特性があります。</div>'
    + '</div>'
    + '<div class="jdr-card-full jdr-card--blue"><strong>攻めと守り、2つの鍵で好循環を</strong>「ストレス反応」の緩和には「仕事の負担」を減らすこと、また「リソース」を充実させるという2つのアプローチがあります。社員のパフォーマンス向上と、組織全体の業績改善につながります。</div>'
    + '<p class="jdr-source">JD-Rモデル（Bakker &amp; Demerouti, 2007）に基づく</p>'
    + '</div>';

  // ── カテゴリヘッダー ──
  function categoryHeaderHTML(colorClass, label, desc) {
    return '<div class="category-header category-header--' + colorClass + '">'
      + '<div class="category-header__label">' + label + '</div>'
      + '<p class="category-header__desc">' + desc + '</p>'
      + '</div>';
  }

  // ── ① ストレッサー ──
  var STRESSOR_META = {
    '仕事の量的負担':                         { label: '仕事の量的負担',   desc: '業務量の多さや時間内に処理しきれないことによる負担' },
    '仕事の質的負担':                         { label: '仕事の質的負担',   desc: '注意集中・知識・技術の高さによる質的な業務負担' },
    '身体的負担度':                           { label: '身体的負担度',     desc: '身体を動かす作業など、からだへの業務負担' },
    '職場での対人関係':                       { label: '職場での対人関係', desc: '部署内外の意見の相違・対立など対人関係の負担' },
    '職場環境':                               { label: '職場環境',         desc: '騒音・照明・温度・換気など物理的環境による負担' },
    '情緒的負担':                             { label: '情緒的負担',       desc: '気持ちや感情がかき乱されるなど感情面の業務負担' },
    '役割葛藤':                               { label: '役割葛藤',         desc: '複数の方針・要求が相容れず業務遂行が困難になる負担' },
    'ワーク・セルフ・バランス（ネガティブ）': { label: 'WSB（ネガ）',       desc: '仕事の負担が個人生活に悪影響を及ぼしている程度' }
  };

  function buildStressor(scaleResults) {
    var scales = scalesByCategory(scaleResults, '1.ストレッサー（仕事の負担）');
    var body = catDescHTML(
      '仕事で感じる負担の大きさです。右寄りほど負担が大きい状態で、'
      + '負担が続くと③の心身反応につながりやすくなります。'
    );
    for (var i = 0; i < scales.length; i++) {
      var s    = scales[i];
      var meta = STRESSOR_META[s.name] || { label: s.name, desc: '' };
      var c    = colorHex(getDevColor(s.displayDev, true));
      body += '<div class="scale-row">'
        + '<div class="scale-row-header">'
        +   '<span class="scale-name" style="color:' + c + '">' + meta.label + '</span>'
        +   '<span class="scale-dev"  style="color:' + c + '">' + s.displayDev.toFixed(1) + '</span>'
        + '</div>'
        + barHTML(s.dev, true)
        + '<div class="scale-desc">' + meta.desc + '</div>'
        + '</div>';
    }
    return sectionWrap('sec-stressor', C.coral, '①', 'ストレッサー（仕事の負担）', body);
  }

  // ── ② リソース（カテゴリ単位）──
  function buildResource(scaleResults, badgeText, title, cat, catDesc) {
    var scales = scalesByCategory(scaleResults, cat);
    if (!scales.length) return '';
    var avg  = avgOfDevs(scales);
    var body = catDescHTML(catDesc)
      + groupBarHTML(avg, false)
      + bwCardsHTML(scales, false, SCALE_DESC_RESOURCE);
    return sectionWrap('sec-resource', C.teal, badgeText, title, body);
  }

  // ── ③-1 精神的ストレス反応 ──
  function buildMentalStress(scaleResults) {
    var scales = scalesByCategory(scaleResults, '3-1.精神的ストレス（アウトカム）');
    if (!scales.length) return '';

    var avg = Math.round(scales.reduce(function(s, x) {
      return s + toStressDev(x.dev, x.name);
    }, 0) / scales.length * 10) / 10;

    var best  = scales.reduce(function(a, b) { return toStressDev(a.dev, a.name) < toStressDev(b.dev, b.name) ? a : b; });
    var worst = scales.reduce(function(a, b) { return toStressDev(a.dev, a.name) > toStressDev(b.dev, b.name) ? a : b; });

    var body = catDescHTML(
      '活気・イライラ感・疲労感・不安感・抑うつ感の5項目の平均です。'
      + '活気のみ高いほど良いスケールで、他は低いほど良好です。'
    )
      + groupBarHTML(avg, true)
      + (function() {
          function mentalCardExtra(s) {
            var desc = SCALE_DESC_MENTAL[s.name] || '';
            if (!desc) return '';
            var diff = Math.round((s.dev - 50) * 10) / 10;
            var diffStr = (diff >= 0 ? '+' : '') + diff.toFixed(1) + 'pt';
            var sep = (desc.slice(-1) === '。') ? '' : '。';
            return '<div class="bw-card-desc">' + desc + sep + '全国平均より' + diffStr + '。</div>';
          }
          return '<div class="bw-cards">'
            + '<div class="bw-card best"><div class="bw-card-lbl">強み（最も良好）</div>'
            +   '<div class="bw-card-name">' + best.name + '</div>'
            +   '<div class="bw-card-dev">偏差値 ' + best.dev.toFixed(1) + '</div>'
            +   mentalCardExtra(best) + '</div>'
            + '<div class="bw-card worst"><div class="bw-card-lbl">課題（最も要注意）</div>'
            +   '<div class="bw-card-name">' + worst.name + '</div>'
            +   '<div class="bw-card-dev">偏差値 ' + worst.dev.toFixed(1) + '</div>'
            +   mentalCardExtra(worst) + '</div>'
            + '</div>';
        })();
    return sectionWrap('sec-outcome', C.purple, '③-1', '精神的ストレス', body);
  }

  // ── ③-2 身体愁訴 ──
  function buildBodyComplaints(scaleResults) {
    var scales = scalesByCategory(scaleResults, '3-2.身体的ストレス（アウトカム）');
    if (!scales.length) return '';
    var s    = scales[0];
    var body = '<div class="sec-desc">めまい・体のふしぶしの痛み・頭痛・肩こり・腰痛・目の疲れ・動悸や息切れ・胃腸の不調・食欲不振・便秘や下痢・不眠など身体的な不調の訴えです。'
      + '低いほど良好で、現在は全国平均より大きく低い状態です。'
      + 'スコアが上昇してきた場合は、医療機関や相談窓口への受診・相談をご検討ください。</div>'
      + groupBarHTML(s.dev, true);
    return sectionWrap('sec-outcome', C.purple, '③-2', '身体愁訴', body);
  }

  // ── ③-3 アウトカム（ハラスメント除外）──
  function buildOutcome(scaleResults) {
    var all    = scalesByCategory(scaleResults, '3-3.その他（アウトカム）');
    var scales = all.filter(function(s) { return s.name !== '職場のハラスメント'; });
    if (!scales.length) return '';
    var avg  = avgOfDevs(scales);
    var body = catDescHTML(
      '仕事満足度・職場の一体感・ワークエンゲイジメント・職務の遂行・'
      + '創造性・積極的な学習・家庭満足度の7項目の平均です。'
      + '②リソースの充実がアウトカム向上につながります。'
    )
      + groupBarHTML(avg, false)
      + bwCardsHTML(scales, false, SCALE_DESC_OUTCOME);
    return sectionWrap('sec-outcome', C.purple, '③-3', 'アウトカム', body);
  }

  // ── ⚠ ハラスメントリスク ──
  function buildHarassment(scaleResults) {
    var all = scalesByCategory(scaleResults, '3-3.その他（アウトカム）');
    var s   = null;
    for (var i = 0; i < all.length; i++) {
      if (all[i].name === '職場のハラスメント') { s = all[i]; break; }
    }
    if (!s) return '';
    var body = '<div class="sec-desc">いじめ・嫌がらせ・パワハラ・セクハラの経験・目撃頻度です。'
      + '低いほど良好で、現在は全国平均より大きく低い状態です。'
      + '気になることがある場合は、社内外の相談窓口への相談をご検討ください。</div>'
      + groupBarHTML(s.dev, true);
    return sectionWrap('sec-hazard', C.danger, '⚠', 'ハラスメントリスク', body);
  }

  // ── メイン描画 ──
  function render() {
    var raw = sessionStorage.getItem('stressResult');
    if (!raw) {
      document.getElementById('root').innerHTML =
        '<div style="text-align:center;padding:60px 20px;">'
        + '<p style="color:#999;margin-bottom:20px">結果データが見つかりません。</p>'
        + '<a href="index.html" style="color:#5DCAA5;font-weight:700">← チェックを受ける</a>'
        + '</div>';
      return;
    }

    var data         = JSON.parse(raw);
    var level        = data.level;
    var scaleResults = data.scaleResults;
    var levelLbl     = level === 'high' ? '高ストレス' : level === 'mid' ? '中程度のストレス' : '低ストレス';
    var date         = new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });

    var html = '';

    // ヘッダー
    html += '<div class="r-header">'
      + '<div class="r-badge ' + level + '">' + levelLbl + '</div>'
      + '<h1 class="r-title">今のあなたのストレス状態</h1>'
      + '<p class="r-subtitle">実施日：' + date + '　各スケールの偏差値（全国平均=50）で示しています</p>'
      + '</div>';

    // 高ストレスアラート
    if (level === 'high') {
      html += '<div class="high-alert">'
        + '<div class="high-alert-title">⚠ 高ストレスの可能性があります</div>'
        + '<div class="high-alert-desc">回答結果から仕事上のストレスが高い状態にある可能性があります。'
        + '産業医・保健師・カウンセラーへの相談をご検討ください。<br>'
        + '面接指導の申出は労働者の権利であり、それを理由に不利益な取扱いを受けることは法律で禁止されています。</div>'
        + '</div>';
    }

    // 凡例
    html += '<div class="legend">'
      + '<div class="legend-card">'
      +   '<div class="legend-top"><span class="legend-dot" style="background:#378ADD"></span><span class="legend-name" style="color:#378ADD">平均的</span></div>'
      +   '<div class="legend-lbl">±5以内</div>'
      + '</div>'
      + '<div class="legend-card">'
      +   '<div class="legend-top"><span class="legend-dot" style="background:#EF9F27"></span><span class="legend-name" style="color:#EF9F27">注意</span></div>'
      +   '<div class="legend-lbl">5〜10pt差</div>'
      + '</div>'
      + '<div class="legend-card">'
      +   '<div class="legend-top"><span class="legend-dot" style="background:#E24B4A"></span><span class="legend-name" style="color:#E24B4A">要注意</span></div>'
      +   '<div class="legend-lbl">10pt超</div>'
      + '</div>'
      + '</div>';

    // JD-Rモデル図解
    html += JDR_HTML;

    // 各セクション
    html += buildStressor(scaleResults);
    html += categoryHeaderHTML('teal', '② 職場・仕事のリソース',
      'リソースとは、仕事の負担を和らげ、成長・やりがい・アウトカムを高める職場の資源です。'
      + '個人レベルの「作業リソース」、部署・チームレベルの「部署リソース」、'
      + '組織・経営レベルの「会社リソース」の3層で構成されます。'
      + 'リソースが豊富な環境ほど、高い負担下でも心身の健康が保たれやすくなります。'
    );
    html += buildResource(scaleResults, '②-1', '作業リソース',
      '2-1.作業リソース（仕事の資源）',
      '個人レベルで仕事を支える資源です。コントロール感・技能の活用・適性・意義・'
      + '役割の明確さ・成長の機会・新奇性・予測可能性・WSBポジティブの9項目の平均です。'
    );
    html += buildResource(scaleResults, '②-2', '部署リソース',
      '2-2.部署リソース（仕事の資源）',
      '部署・チームレベルの資源です。上司・同僚のサポート、上司のリーダーシップ・公正な態度、'
      + '経済・尊重・安定の三大報酬、ほめてもらえる職場、失敗を認める職場、グループの有能感、'
      + '家族・友人からのサポートの11項目の平均です。'
    );
    html += buildResource(scaleResults, '②-3', '会社リソース',
      '2-3.会社リソース（仕事の資源）',
      '組織・経営レベルの資源です。経営層との信頼関係・変化への対応・手続きの公正性・'
      + '個人の尊重・公正な人事評価・多様性への対応・キャリア形成の7項目の平均です。'
    );
    html += categoryHeaderHTML('red', '③ 個人の状態',
      '仕事の負担やリソースの状態が、心身にどう現れているかを示します。'
      + '③-1は感情・気力などの精神的な反応、③-2は身体症状、③-3は仕事への関与や充実度です。'
      + '③-1のスコアが悪化すると③-2へ進行しやすくなるため、早期のサインとして重要です。'
    );
    html += buildMentalStress(scaleResults);
    html += buildBodyComplaints(scaleResults);
    html += buildOutcome(scaleResults);
    html += buildHarassment(scaleResults);

    // ボタン
    html += '<div class="actions">'
      + '<button class="btn primary" onclick="alert(\'この機能は準備中です\')">AIに詳しく話を聞いてもらう（有料）↗</button>'
      + '<button class="btn" onclick="window.print()">PDFで保存</button>'
      + '</div>';

    // 免責
    html += '<div class="disclaimer">'
      + 'このAIは医療行為を行いません。表示内容は参考情報であり診断・治療の代替にはなりません。<br>'
      + '気になる症状がある場合は、医療機関や相談窓口への受診・相談をご検討ください。'
      + '</div>';

    document.getElementById('root').innerHTML = html;
    window.scrollTo(0, 0);
  }

  render();
})();
</script>
