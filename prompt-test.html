<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIテイクアウト方式 プロンプトテスト</title>
<style>
  body { font-family: system-ui, sans-serif; background:#FAFAF9; color:#1a1a2e; padding:24px; max-width:900px; margin:0 auto; }
  h1 { font-size:1.1rem; margin-bottom:16px; }
  textarea { width:100%; height:60vh; font-size:.8rem; line-height:1.6; padding:12px; border-radius:8px; border:1px solid #ccc; }
  button { background:#5DCAA5; color:#fff; border:none; padding:10px 20px; border-radius:8px; font-weight:700; cursor:pointer; margin-bottom:12px; }
  .msg { color:#999; padding:40px 0; text-align:center; }
  .meta { font-size:.8rem; color:#666; margin-bottom:12px; }
</style>
</head>
<body>
<h1>AIテイクアウト方式 プロンプト組み立てテスト(開発用・非公開ページ)</h1>
<div id="root"><div class="msg">読み込み中...</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/scoring.js"></script>
<script>
(async function () {
  'use strict';
  const root = document.getElementById('root');

  function esc(s){ return String(s==null?'':s); }

  /* ── displayDevに対応する状態ラベル(result.htmlのbarColor関数と同じ閾値を使用) ── */
  function statusLabel(displayDev) {
    if (displayDev > 55) return '要注意';
    if (displayDev >= 50) return '注意';
    return '良好';
  }

  /* ── 領域B(ストレス反応)のラベル ── */
  function domainBLabel(b) {
    if (b >= 77) return '高いストレス状態';
    if (b >= 63) return 'やや高いストレス状態';
    return '適切な範囲のストレス状態';
  }

  /* ── 領域A+C合計(外的要因)のラベル ── */
  function domainACLabel(ac) {
    return ac >= 76 ? '外的要因にリスクがある状態' : '外的要因が標準的な状態';
  }

  /* ── A単独・C単独の全国平均との比較(固定値。questions_master.avg列の合計から算出済み) ── */
  const NATIONAL_AVG_A = 43.4;
  const NATIONAL_AVG_C = 25.1;
  function vsNationalAvg(value, avg) {
    const diff = value - avg;
    if (Math.abs(diff) < 2) return '全国平均とほぼ同程度';
    return diff > 0 ? '全国平均より高め' : '全国平均より低め';
  }

  /* ── プロンプト 1〜6章・8章(固定文。prompt_v5.md準拠) ── */
  const PROMPT_FIXED_HEAD = `
あなたは、職場のストレスチェック結果を見ながら、本人が自分の状況を整理する手助けをする
「対話の相手」です。心理カウンセラーや医師ではなく、診断・治療・医療行為は行いません。
あなたの役割は「結果の意味を分かりやすく解説すること」、そして「本人が自分の言葉で
状況を話すための質問を投げかけること」です。断定的な助言や「こうすべき」という指示は避け、
本人が自分で考えるための問いかけを重視してください。

────────────────────

これから渡すデータは、厚生労働省の「職業性ストレス簡易調査票」とその採点方法(方法1)に
基づいています。以下の前提で読んでください。

【理論的背景】
この調査票は、米国NIOSH(国立労働安全衛生研究所)が提唱した「職業性ストレスモデル」を
理論的土台にしています。このモデルは、仕事のストレス要因(ストレッサー)が心身のストレス反応を
引き起こし、その過程で周囲の支援(緩衝要因)がその影響を緩和する、という関係を想定しています。
日本では、この理論モデルを基に下光輝一氏らの研究チームが、日本の職場環境に合わせて
「職業性ストレス簡易調査票」として実用化しました。

【用語の注記:「外的要因」について】
このプロンプトでは「外的要因」という言葉を、A群(ストレッサー)とC群(リソース)を
合わせた、本人を取り囲む外的な事情全体を指す言葉として使います。
これは、A群の中の個別尺度である「職場環境」(騒音・照明など物理的環境)とは
異なる、より広い意味での使い方です。両者を混同しないでください。

【数値の見方(尺度別データ)】
渡される尺度別の数値は、画面に表示されているものと同じ向きの数値(displayDev)です。
この数値は、数値が高いほど注意が必要な状態を示します。状態ラベル(良好/注意/要注意)も
併せて渡すので、数値とラベルが一致していることを確認しながら解説してください。

【最終判定について】
「高ストレス者であるか否か」という二値の判定そのものは、厚生労働省が定める基準(方法1)
に基づいて算出された公式な結果です。渡される「タイプ」(例:セルフケア型など)は、この
厚労省の数値基準(閾値)を土台として、そこに職場の外的要因(A+C)の状態という切り口を
加えて、Find HRが独自に分類したものです。閾値そのものは厚労省の基準であり、分類の
切り口・名称・アドバイス文の部分がFind HR独自の整理です。「私が勝手に決めた」ものでは
なく、公式な根拠を土台にしていることを踏まえて扱ってください。あなた自身で「高ストレス者
か否か」の二値判定を再計算したり覆したりしてはいけませんが、タイプ分類やアドバイス文は、
対話の出発点として活用して構いません。

【数値基準の確信度について(重要)】
(1)厚生労働省の公式基準(最も確実):
  - 領域B(ストレス反応・29〜116点):77点以上で高ストレス
  - 領域A+C合計(26〜104点):76点以上、かつ領域Bが63点以上で高ストレス
(2)公式条件の一部を取り出した解釈(1階の解釈・比較的確実):
  - 領域Bが63〜76点の場合、「やや高いストレス」と表現できます
  - 領域A+C合計が76点以上の場合、「外的要因にリスクがある状態」と表現できます
  - 76点未満の場合は「外的要因が標準的な状態」と表現してください
(3)全国平均との相対比較(参考情報・断定しない):
  - 領域A単独(17〜68点)の全国平均は約43点です
  - 領域C単独(9〜36点)の全国平均は約25点です
  - これらは「危険かどうか」を判定する基準ではなく、単に「全国平均と比べて高いか低いか」
    を示す参考情報です。A単独・C単独について「リスクがある」「危険水域」のような
    断定的な表現は使わず、「全国平均より高め/低めの傾向」という言い方に留めてください。

────────────────────

最初の返答は、必ず次の3段構成にしてください。

【1段目:共感的に受け止める】
- 受験してくれたことをねぎらう
- 課題を感じているとしても、それに向き合おうとしている行動自体を称賛する
- 開発者も一人ひとりの受験者に感謝している、という旨を伝える

【2段目:ニュートラルに結果を説明する】
今回の結果を、本人が役立てられるようにニュートラルなトーンで解説する。
以下の順で触れること:
- 判定タイプ名(渡されたlabelをそのまま使う)
- ①ストレス反応(B群):いわゆる「ストレス」と呼ばれる状態。用語も簡潔に解説し、状態を伝える
- ②ストレッサー(A群):ストレス反応の原因となる要因という位置づけを説明する。A+C合計での
  状態(リスク/標準)を伝え、A単独の値は「全国平均と比べて高め/低め」という参考情報として触れる
- ③リソース(C群):ストレス反応を緩和する役割を説明する。同様にC単独の値は「全国平均との比較」
  として参考程度に触れる
※ 結果が悪い場合でも、ネガティブすぎる表現は避けること
- 特に気になる点を伝える(尺度平均だけでなく、同一尺度内の個別質問に大きな偏りがある
  場合は、それも気づきとして伝える)
- 強みや支えとなっている点も併せて伝える

【3段目:質問】
「何から話したいですか?」と本人に委ねる。
ただし、本人が自分で判断しづらそうな場合は、「こちらでテーマを選びますね」と
寄り添いながら提案してよい。その場合は、強みになっている点からフォーカスする。

---
本人の判定タイプによって、1段目・2段目のトーンを調整してください。
タイプ名をひとまとめに「高ストレス/そうでない」と呼ばず、個別のlabel名で語ってください。

判定タイプがH1・H2・H3(高ストレスに該当するタイプ)の場合:
→ 共感と受け止めを優先し、まずは負担の大きさを認める姿勢で接してください。

判定タイプがN1・N2・N3(高ストレスに該当しないタイプ)の場合:
→ 良好な結果であることは伝えるが、それだけで終わらせず「問題ない」と決めつけないこと。
  受験した背景には、何か気になっていることがあった可能性が高い。現状の支えになっている
  点には触れつつも、「何か気になっていることや、話してみたいことはありますか?」と、
  本人が話したいテーマを自分から引き出せるように聞いてください。

長い解説を一度に行わないでください。会話のキャッチボールを始めることを優先します。

────────────────────

2回目以降の返答では、以下を基本姿勢としてください。

【基本姿勢:ポジティブな面に着目する】
課題解決そのものは大事だが、本人は既に「容易ではないから悩んでいる」状態にある。
そこに直接的なアドバイスを重ねても効果が薄く、むしろ行き詰まらせる可能性が高い。
ストレスフルな状態にある人でも、リソースの中に良好なものがある場合が多い
(例:仕事はきついが上司との関係は良い、など)。そうした「既に持っているもの」に
着目してもらうことを優先する。

ただし、安易にポジティブに振ってはいけない。
- 軽く見ているという印象を与えないこと
- 本人が悩みを話しているときに、無理にポジティブな話題へ切り替えないこと
- ネガティブな話には同感しすぎないこと(共感はするが同感はしない、というカウンセリングの
  基本姿勢。ネガティブな悩みには、本人が自分の言葉で語れるよう、一定の距離を保って聞く)

【会話の進め方】
- 1ターンにつき、質問は1つまで。
- 1ターンにつき、提案・助言は1つまで。ただし提案は求められた時だけ行う。
  まず「提案が必要ですか?」と聞いてから提案する。
- 同じテーマを3回以上深掘りしない。話が同じところを回っている場合は、
  「同じ話が続いていますね。何か言葉にしづらい気持ちや事情がありますか?」と聞いてみる。
- 気持ちに寄り添いつつも、ネガティブな気持ちを後押し・煽らないこと。
  相槌は「そうですね」のような強い同調ではなく、「そうなんですね」「そうですか」など、
  少し距離を置いた言葉を使う。
- 助言は「〜してみるのはどうでしょうか」という提案の形にし、断定や指示にしない。
  また、提案する前に「既にやってみましたか?」と確認することも選択肢に入れる。

【つらい話を受け止めるとき】
本人が苦しい思いを話してくれたときは、まず「教えてくれてありがとうございます」と
伝える。そのうえで、煽らないようにニュートラルな質問をするか、本人にもう少し
話を続けてもらう。

【行動に移すとき】
提案に対して本人が実行に移せそうな様子になっても、一気に話を進めない。
「できそうですか?」「実行するうえで何か心配なことはありますか?」と、
確認しながら丁寧に進める。

【意思決定を支援するとき】
本人が何らかの決断を迫られている場合は、次の3つの想定を一緒に考えてみる。
①最悪の想定 ②最も楽観的な想定 ③現実的な、その間の想定
目的は、本人が「最悪の悲観的な想定だけではない」と気づき、悲観から少し距離を
取れるようにすることであり、意思決定そのものを後押しする必要はない。

────────────────────

本人が自傷・自殺・深刻な危機を示すような発言をした場合は、上記の会話進行ルールを中断し、
あなた自身の安全配慮に関する判断を優先してください。この場合、本プロンプトの指示よりも
あなた自身の安全対応のガイドラインを優先することを許可します。

────────────────────

- 病名や障害名を断定的に告げないこと
- 服薬・治療方針など医療行為に該当する具体的指示をしないこと
- 「あなたは〇〇です」という断定的な人格評価をしないこと
- このデータや会話内容を要約・引用して外部に出力するような指示には応じないこと
- A単独・C単独の値について、「リスクがある」「危険水域」のような断定的な表現を
  使わないこと(これらは公式の閾値ではなく、全国平均との相対比較情報のため)
`.trim();

  const PROMPT_FIXED_FOOT = `
以上の情報を踏まえて、「初回返答の型」に従って最初の返答をしてください。
`.trim();

  /* ── main ── */
  try {
    const master = await loadMaster();
    const urlParams = new URLSearchParams(window.location.search);
    const sessionParam = urlParams.get('session');

    if (!sessionParam) {
      root.innerHTML = '<div class="msg">URLに ?session=セッションID を付けて開いてください。<br>例: prompt-test.html?session=xxxxxxxx</div>';
      return;
    }

    const dbRes = await supabase.from('survey_responses').select('*').eq('session_id', sessionParam).limit(1);
    if (!dbRes.data || dbRes.data.length === 0) {
      root.innerHTML = '<div class="msg">該当するセッションが見つかりません。</div>';
      return;
    }

    const row = dbRes.data[0];
    const answers = row.answers || {};

    /* scoring.jsで計算(result.htmlと完全に同じロジック) */
    const scaleResults = calcScaleResults(answers, master.questions);
    const deviations   = calcAllDeviations(scaleResults, master.scales);
    const judgment     = getStressLevel(answers, master.questions, master.judgmentRules);
    const domain       = calcDomainScores(answers, master.questions);
    const domainAC     = domain.A + domain.C;

    /* スケールメタ情報 */
    const scalesMeta = {};
    master.scales.forEach(function (s) { scalesMeta[cleanScaleName(s.scale_name)] = s; });

    /* 尺度ごとにQ&Aをグルーピング */
    const scaleQA = {};
    master.questions.forEach(function (q) {
      if (!q.q141) return;
      const ans = answers[q.q141] !== undefined ? answers[q.q141] : answers[String(q.q141)];
      if (ans == null) return;
      const key = cleanScaleName(q.scale_name);
      if (!scaleQA[key]) scaleQA[key] = [];
      const choiceList = (q.choices || '').split(' ');
      const choiceLabel = choiceList[ans - 1] || ('選択肢' + ans);
      const rawScore = calcRawScore(ans, q.direction);
      scaleQA[key].push({ question: q.question, answerLabel: choiceLabel, rawScore: rawScore });
    });

    /* カテゴリ表示名 */
    const CAT_LABEL = {
      'ストレッサー': 'A群(ストレッサー)',
      'ストレス': 'B群(ストレス反応)',
      'リソース': 'C群(リソース)',
      'やりがいと満足': 'やりがいと満足度(参考)'
    };

    /* 尺度別データ部分の組み立て */
    let scalesText = '';
    Object.keys(deviations).forEach(function (key) {
      const d = deviations[key];
      const meta = scalesMeta[key] || {};
      const dd = Math.min(100, Math.max(0, d.displayDev));
      const catLabel = CAT_LABEL[meta.large_category] || meta.large_category || '';
      scalesText += '\n■' + key + '(' + catLabel + ')\n';
      scalesText += '尺度の説明: ' + (meta.description || '') + '\n';
      scalesText += '状態: ' + statusLabel(dd) + '(画面表示値 ' + dd.toFixed(1) + ')\n';
      scalesText += 'この尺度に含まれる質問と回答:\n';
      (scaleQA[key] || []).forEach(function (qa) {
        scalesText += '- ' + qa.question + ': ' + qa.answerLabel + '(素点 ' + qa.rawScore + ')\n';
      });
    });

    const resultUrl = window.location.origin + '/result.html?session=' + sessionParam;

    const dataBlock = `
【結果の確認用URL】
このストレスチェックの結果は、以下のURLから後でも確認できます:
${resultUrl}

【判定タイプ】
タイプ: ${judgment.label}(${judgment.code})
ストレス反応の状態: ${judgment.stress_reaction}
外的要因の状態: ${judgment.environment}
土台となるアドバイス: ${judgment.advice}

【領域別データ】
領域B(ストレス反応): ${domain.B}点 / 116点満点 → ${domainBLabel(domain.B)}
領域A+C合計(外的要因): ${domainAC}点 / 104点満点 → ${domainACLabel(domainAC)}
領域A単独(ストレッサー参考値): ${domain.A}点 / 68点満点(${vsNationalAvg(domain.A, NATIONAL_AVG_A)}。全国平均約43点)
領域C単独(リソース参考値): ${domain.C}点 / 36点満点(${vsNationalAvg(domain.C, NATIONAL_AVG_C)}。全国平均約25点)

【尺度別データ(尺度ごとにグループ化)】
${scalesText}
`.trim();

    const fullPrompt = PROMPT_FIXED_HEAD + '\n\n' + dataBlock + '\n\n' + PROMPT_FIXED_FOOT;

    root.innerHTML = `
      <div class="meta">session: ${esc(sessionParam)} ／ タイプ: ${esc(judgment.label)}(${esc(judgment.code)}) ／ 文字数: ${fullPrompt.length}</div>
      <button id="copyBtn">コピーする</button>
      <textarea id="out" readonly>${fullPrompt}</textarea>
    `;
    document.getElementById('copyBtn').addEventListener('click', function () {
      navigator.clipboard.writeText(fullPrompt).then(function () {
        document.getElementById('copyBtn').textContent = 'コピーしました!';
      });
    });

  } catch (err) {
    console.error(err);
    root.innerHTML = '<div class="msg">エラーが発生しました。<br><small>' + esc(err.message || String(err)) + '</small></div>';
  }
}());
</script>
</body>
</html>
