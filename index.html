<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ストレスチェック フリー</title>
<style>
:root {
  --teal:   #5DCAA5;
  --coral:  #F0997B;
  --ink:    #1a1a2e;
  --ink2:   #4a4a6a;
  --paper:  #faf9f6;
  --warm:   #f3f0e8;
  --border: #d6d0c4;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: var(--paper); color: var(--ink); line-height: 1.7;
}
.screen { display: none; }
.screen.active { display: block; }

/* ── ローディング ── */
.loading-wrap {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; gap: 16px;
}
.spinner {
  width: 38px; height: 38px;
  border: 3px solid var(--border); border-top-color: var(--teal);
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── スタート画面 ── */
.start-wrap { max-width: 520px; margin: 0 auto; padding: 40px 20px 80px; }
.start-title    { font-size: 1.6rem; font-weight: 700; text-align: center; margin-bottom: 4px; }
.start-subtitle { font-size: .85rem; color: var(--teal); text-align: center; margin-bottom: 28px; }
.start-desc {
  background: #fff; border: 1px solid var(--border); border-radius: 12px;
  padding: 18px 20px; margin-bottom: 18px; font-size: .88rem; line-height: 1.9;
}
.start-desc li { margin-left: 1.4em; margin-bottom: 2px; }
.legal-box {
  background: var(--warm); border-radius: 10px; padding: 14px 16px;
  font-size: .75rem; color: var(--ink2); line-height: 1.8; margin-bottom: 24px;
}
.btn-start {
  display: block; width: 100%; background: var(--teal); color: #fff;
  border: none; border-radius: 10px; padding: 15px; font-size: 1rem;
  font-weight: 700; cursor: pointer; margin-bottom: 20px; transition: background .2s;
}
.btn-start:hover { background: #3db88a; }
.test-section-lbl { text-align: center; font-size: .73rem; color: var(--ink2); margin-bottom: 8px; }
.test-btn-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.btn-test {
  padding: 5px 11px; border-radius: 6px; border: 1px solid var(--border);
  background: #fff; font-size: .73rem; cursor: pointer; color: var(--ink2); transition: background .2s;
}
.btn-test:hover { background: var(--warm); }

/* ── 回答画面：ヘッダー ── */
.q-header {
  position: sticky; top: 0; z-index: 10;
  background: #fff; border-bottom: 1px solid var(--border); padding: 10px 16px 0;
}
.q-header-top {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px;
}
.q-header-title { font-size: .88rem; font-weight: 700; }
.q-header-page  { font-size: .84rem; color: var(--ink2); font-weight: 700; }
.q-test-row     { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.prog-bar       { height: 3px; background: var(--warm); }
.prog-fill      { height: 100%; background: var(--teal); transition: width .4s ease; }

/* ── 回答画面：本文 ── */
.q-wrap { max-width: 680px; margin: 0 auto; padding: 16px 16px 110px; }
.warn-msg {
  display: none; background: #fde8e8; border: 1px solid #f5a5a7; border-radius: 8px;
  padding: 10px 14px; font-size: .84rem; color: #b5373a; margin-bottom: 14px;
}
.q-card {
  background: #fff; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 16px; margin-bottom: 12px; transition: border-color .2s;
}
.q-card.answered { border-color: var(--teal); }
.q-num  { font-size: .73rem; color: var(--ink2); font-weight: 700; margin-bottom: 5px; }
.q-text { font-size: .91rem; line-height: 1.65; margin-bottom: 12px; }
.choices {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;
}
.choice-btn {
  padding: 8px 6px; border: 1.5px solid var(--border); border-radius: 7px;
  background: #fff; font-size: .8rem; cursor: pointer; text-align: center;
  line-height: 1.4; transition: all .15s; color: var(--ink);
  font-family: inherit;
}
.choice-btn:hover    { background: var(--warm); border-color: #b0a898; }
.choice-btn.selected { background: var(--teal); color: #fff; border-color: var(--teal); }

/* ── 回答画面：フッター ── */
.q-footer-outer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff; border-top: 1px solid var(--border); padding: 10px 16px;
}
.q-footer {
  max-width: 680px; margin: 0 auto; display: flex; gap: 10px;
}
.btn-prev {
  flex: 1; padding: 11px; border-radius: 8px; border: 2px solid var(--border);
  background: #fff; font-size: .88rem; font-weight: 700; cursor: pointer;
  color: var(--ink2); font-family: inherit;
}
.btn-prev:disabled { opacity: .4; cursor: default; }
.btn-next {
  flex: 2; padding: 11px; border-radius: 8px; border: none;
  background: var(--teal); color: #fff; font-size: .88rem; font-weight: 700;
  cursor: pointer; transition: background .2s; font-family: inherit;
}
.btn-next:disabled            { background: #ccc; cursor: default; }
.btn-next:not(:disabled):hover { background: #3db88a; }

/* ── 確認画面 ── */
.confirm-wrap {
  max-width: 520px; margin: 0 auto; padding: 60px 20px; text-align: center;
}
.confirm-icon  { font-size: 2.4rem; margin-bottom: 14px; }
.confirm-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 10px; }
.confirm-desc  { color: var(--ink2); font-size: .9rem; margin-bottom: 32px; }
.confirm-btns  { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.btn-back {
  padding: 12px 24px; border-radius: 8px; border: 2px solid var(--border);
  background: #fff; font-size: .9rem; font-weight: 700; cursor: pointer; font-family: inherit;
}
.btn-submit {
  padding: 12px 28px; border-radius: 8px; border: none;
  background: var(--teal); color: #fff; font-size: .9rem; font-weight: 700;
  cursor: pointer; transition: background .2s; font-family: inherit;
}
.btn-submit:disabled            { background: #ccc; cursor: default; }
.btn-submit:not(:disabled):hover { background: #3db88a; }
.submit-msg { margin-top: 18px; color: var(--ink2); font-size: .85rem; min-height: 20px; }

@media (max-width: 400px) {
  .choices { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- ローディング -->
<div id="scLoading" class="screen active">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div style="color:#999;font-size:.84rem">読み込み中...</div>
  </div>
</div>

<!-- P1：スタート画面 -->
<div id="scStart" class="screen">
  <div class="start-wrap">
    <div class="start-title">ストレスチェック フリー</div>
    <div class="start-subtitle">― 職場のストレス状態を確認する ―</div>
    <div class="start-desc">
      <ul>
        <li>職場のストレス状態を無料で確認できます</li>
        <li>141問・所要時間15〜20分</li>
        <li>回答は匿名で処理されます</li>
      </ul>
    </div>
    <div class="legal-box">
      本ツールはストレスチェック実施を支援するWebサービスです。<br>
      質問や採点方法は厚生労働省が発表している調査票・全国平均データセットに基づき、実施規定・実施マニュアルに準拠しています。<br>
      結果の管理・面接指導の実施は、各事業者の責任において行われます。
    </div>
    <button class="btn-start" id="btnStartMain">調査をはじめる →</button>
    <div class="test-section-lbl">テストモード</div>
    <div class="test-btn-row">
      <button class="btn-test" onclick="setTestDataAndStart(1)">全ネガ</button>
      <button class="btn-test" onclick="setTestDataAndStart(2)">ややネガ</button>
      <button class="btn-test" onclick="setTestDataAndStart(3)">ややポジ</button>
      <button class="btn-test" onclick="setTestDataAndStart(4)">全ポジ</button>
      <button class="btn-test" onclick="setTestDataAndStart('random')">ランダム</button>
    </div>
  </div>
</div>

<!-- P2〜P9：回答画面 -->
<div id="scQuestions" class="screen">
  <div class="q-header">
    <div class="q-header-top">
      <span class="q-header-title">ストレスチェック フリー</span>
      <span class="q-header-page" id="hdPage"></span>
    </div>
    <div class="q-test-row">
      <button class="btn-test" onclick="setTestData(1)">全ネガ</button>
      <button class="btn-test" onclick="setTestData(2)">ややネガ</button>
      <button class="btn-test" onclick="setTestData(3)">ややポジ</button>
      <button class="btn-test" onclick="setTestData(4)">全ポジ</button>
      <button class="btn-test" onclick="setTestData('random')">ランダム</button>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="q-wrap">
    <div id="warnMsg" class="warn-msg">未回答の質問があります</div>
    <div id="qContainer"></div>
  </div>
  <div class="q-footer-outer">
    <div class="q-footer">
      <button class="btn-prev" id="btnPrev" onclick="onPrev()">← 戻る</button>
      <button class="btn-next" id="btnNext" onclick="onNext()">次へ →</button>
    </div>
  </div>
</div>

<!-- P10：確認画面 -->
<div id="scConfirm" class="screen">
  <div class="confirm-wrap">
    <div class="confirm-icon">✅</div>
    <div class="confirm-title">141問すべて回答しました</div>
    <div class="confirm-desc">送信して結果を確認しますか？</div>
    <div class="confirm-btns">
      <button class="btn-back" onclick="goToPage(9)">戻る</button>
      <button class="btn-submit" id="btnSubmit" onclick="onSubmit()">送信して結果を見る →</button>
    </div>
    <div class="submit-msg" id="submitMsg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/scoring.js"></script>
<script>
// ─── 状態 ────────────────────────────────────────────
var answers     = {};  // { [q141番号]: 生の選択肢番号(1〜4) }
var questions   = [];  // questions_master 全件
var master      = null;
var currentPage = 1;   // 1=スタート, 2〜9=回答, 10=確認

// ─── ページ定義（q141の範囲） ─────────────────────────
var PAGE_RANGES = {
  2: [1, 19], 3: [20, 37], 4: [38, 57],
  5: [58, 71], 6: [72, 83], 7: [84, 103],
  8: [104, 121], 9: [122, 141]
};

// ─── 初期化 ──────────────────────────────────────────
async function init() {
  try {
    master    = await loadMaster();
    questions = master.questions;
    loadProgress();
    showScreen('scStart');
  } catch(e) {
    document.getElementById('scLoading').innerHTML =
      '<div class="loading-wrap">'
      + '<div style="color:#e24b4a;text-align:center;padding:24px;max-width:340px">'
      + 'データの読み込みに失敗しました。<br>'
      + '<small style="color:#999">' + e.message + '</small><br><br>'
      + '<button onclick="location.reload()" style="padding:9px 22px;border-radius:7px;'
      + 'border:1px solid #ccc;cursor:pointer;font-size:.88rem">再読み込み</button>'
      + '</div></div>';
  }
}

// ─── 画面切り替え ──────────────────────────────────────
function showScreen(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
}

// ─── localStorage ─────────────────────────────────────
function saveProgress() {
  try {
    localStorage.setItem('sc_answers', JSON.stringify(answers));
    localStorage.setItem('sc_page', currentPage);
  } catch(e) {}
}

function loadProgress() {
  try {
    var saved     = localStorage.getItem('sc_answers');
    var savedPage = localStorage.getItem('sc_page');
    if (saved) {
      Object.assign(answers, JSON.parse(saved));
      currentPage = parseInt(savedPage) || 1;
    }
  } catch(e) {}
}

function clearProgress() {
  try {
    localStorage.removeItem('sc_answers');
    localStorage.removeItem('sc_page');
  } catch(e) {}
}

// ─── ページ制御 ───────────────────────────────────────
function getQuestionsForPage(page) {
  var r = PAGE_RANGES[page];
  if (!r) return [];
  return questions.filter(function(q) {
    return q.q141 >= r[0] && q.q141 <= r[1];
  });
}

function checkPageComplete(page) {
  var qs = getQuestionsForPage(page);
  for (var i = 0; i < qs.length; i++) {
    if (answers[qs[i].q141] === undefined) return false;
  }
  return true;
}

function goToPage(page) {
  currentPage = page;
  if (page >= 2 && page <= 9) {
    showScreen('scQuestions');
    renderQuestionPage(page);
  } else if (page === 10) {
    showScreen('scConfirm');
    document.getElementById('btnSubmit').disabled = false;
    document.getElementById('submitMsg').textContent = '';
  } else {
    showScreen('scStart');
  }
}

// ─── 開始 ─────────────────────────────────────────────
function startSurvey() {
  var hasProgress = Object.keys(answers).length > 0
    && currentPage >= 2 && currentPage <= 9;
  goToPage(hasProgress ? currentPage : 2);
}

// ─── テストモード ─────────────────────────────────────
function setTestData(score) {
  questions.forEach(function(q) {
    answers[q.q141] = score === 'random'
      ? Math.floor(Math.random() * 4) + 1
      : score;
  });
  saveProgress();
  renderCurrentPage();
}

function setTestDataAndStart(score) {
  questions.forEach(function(q) {
    answers[q.q141] = score === 'random'
      ? Math.floor(Math.random() * 4) + 1
      : score;
  });
  saveProgress();
  currentPage = 2;
  goToPage(2);
}

// ─── 選択肢テキスト解析 ──────────────────────────────
function parseChoices(str) {
  // "1234　そうだ まあそうだ ややちがう ちがう" → ["そうだ", "まあそうだ", "ややちがう", "ちがう"]
  var parts = str.trim().split(/\s+/);
  if (/^\d+$/.test(parts[0])) parts.shift();
  return parts;
}

// ─── 描画 ─────────────────────────────────────────────
function renderCurrentPage() {
  if (currentPage >= 2 && currentPage <= 9) renderQuestionPage(currentPage);
}

function renderQuestionPage(page) {
  var qs      = getQuestionsForPage(page);
  var pageNum = page - 1;  // 表示用 1〜8

  document.getElementById('hdPage').textContent = pageNum + ' / 8 ページ';
  var answered = Object.keys(answers).length;
  document.getElementById('progFill').style.width = (answered / 141 * 100) + '%';
  document.getElementById('warnMsg').style.display = 'none';

  var html = '';
  for (var i = 0; i < qs.length; i++) {
    var q      = qs[i];
    var texts  = parseChoices(q.choices);
    var isDone = answers[q.q141] !== undefined;
    html += '<div class="q-card' + (isDone ? ' answered' : '') + '" id="qcard' + q.q141 + '">';
    html += '<div class="q-num">Q' + q.q141 + '</div>';
    html += '<div class="q-text">' + q.question.trim() + '</div>';
    html += '<div class="choices">';
    for (var j = 0; j < texts.length; j++) {
      var idx = j + 1;  // 生の選択肢番号 1〜4
      var sel = answers[q.q141] === idx;
      html += '<button class="choice-btn' + (sel ? ' selected' : '') + '"'
        + ' data-no="' + q.q141 + '" data-idx="' + idx + '">'
        + texts[j] + '</button>';
    }
    html += '</div></div>';
  }
  document.getElementById('qContainer').innerHTML = html;

  var btns = document.getElementById('qContainer').querySelectorAll('.choice-btn');
  for (var k = 0; k < btns.length; k++) {
    btns[k].onclick = function() {
      var no  = parseInt(this.getAttribute('data-no'));
      var idx = parseInt(this.getAttribute('data-idx'));
      answers[no] = idx;

      var card = document.getElementById('qcard' + no);
      card.classList.add('answered');
      var siblings = card.querySelectorAll('.choice-btn');
      for (var m = 0; m < siblings.length; m++) siblings[m].classList.remove('selected');
      this.classList.add('selected');

      var prog = Object.keys(answers).length;
      document.getElementById('progFill').style.width = (prog / 141 * 100) + '%';
      document.getElementById('warnMsg').style.display = 'none';
      saveProgress();
      updateNextBtn();
    };
  }

  document.getElementById('btnPrev').disabled = (page === 2);
  updateNextBtn();
  window.scrollTo(0, 0);
}

function updateNextBtn() {
  var btn      = document.getElementById('btnNext');
  var complete = checkPageComplete(currentPage);
  btn.disabled    = !complete;
  btn.textContent = currentPage === 9 ? '確認へ →' : '次へ →';
}

// ─── ナビゲーション ───────────────────────────────────
function onNext() {
  if (!checkPageComplete(currentPage)) {
    document.getElementById('warnMsg').style.display = 'block';
    var qs = getQuestionsForPage(currentPage);
    for (var i = 0; i < qs.length; i++) {
      if (answers[qs[i].q141] === undefined) {
        var el = document.getElementById('qcard' + qs[i].q141);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        break;
      }
    }
    return;
  }
  document.getElementById('warnMsg').style.display = 'none';
  goToPage(currentPage < 9 ? currentPage + 1 : 10);
}

function onPrev() {
  document.getElementById('warnMsg').style.display = 'none';
  if (currentPage > 2) goToPage(currentPage - 1);
}

// ─── 採点・送信 ───────────────────────────────────────
async function buildResult() {
  var scaleResults = calcScaleResults(answers, master.questions);
  var deviations   = calcAllDeviations(scaleResults, master.scales);
  var level        = getStressLevel(deviations);

  await saveToSupabase(answers, level);

  sessionStorage.setItem('stressResult', JSON.stringify({
    level:      level,
    answers:    answers,
    deviations: deviations
  }));

  window.location.href = 'result.html';
}

async function saveToSupabase(answersObj, level) {
  var employeeId = sessionStorage.getItem('employee_id');
  var companyId  = sessionStorage.getItem('company_id');
  if (!employeeId || !companyId) return;
  var result = await supabase.from('survey_responses').insert({
    employee_id:  employeeId,
    company_id:   companyId,
    answers:      answersObj,
    stress_level: level
  });
  if (result.error) console.error('保存エラー:', result.error);
}

async function onSubmit() {
  var btn = document.getElementById('btnSubmit');
  var msg = document.getElementById('submitMsg');
  btn.disabled     = true;
  msg.textContent  = '送信中...';
  try {
    clearProgress();
    await buildResult();
  } catch(e) {
    btn.disabled    = false;
    msg.textContent = 'エラーが発生しました。もう一度お試しください。';
    console.error('送信エラー:', e);
  }
}

// ─── 起動 ────────────────────────────────────────────
document.getElementById('btnStartMain').onclick = startSurvey;
init();
</script>
</body>
</html>
