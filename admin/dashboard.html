<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集計・結果 | ストレスチェック管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;600&display=swap');
:root{--ink:#1a1a2e;--ink2:#4a4a6a;--paper:#faf9f6;--warm:#f3f0e8;--green:#2d6a4f;--green2:#52b788;--green3:#d8f3dc;--warn:#c77c3e;--warn2:#fff3e0;--border:#d6d0c4;--red:#b5373a;--sh:rgba(26,26,46,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
.hd{background:var(--ink);color:#fff;padding:16px 32px;display:flex;align-items:center;gap:20px}
.hd-logo{font-family:'Shippori Mincho',serif;font-size:1.2rem;font-weight:600;flex:1}.hd-logo span{color:var(--green2)}
.hd-nav a{color:rgba(255,255,255,.7);text-decoration:none;font-size:.82rem;margin-left:20px;transition:color .2s}
.hd-nav a:hover,.hd-nav a.active{color:#fff}
.hd-user{font-size:.78rem;color:rgba(255,255,255,.6);margin-left:20px}
.btn-logout{background:transparent;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);padding:5px 12px;border-radius:5px;font-size:.75rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-left:12px;transition:all .2s}
.btn-logout:hover{border-color:#fff;color:#fff}
.main{max-width:1000px;margin:32px auto;padding:0 20px 60px}
.page-title{font-family:'Shippori Mincho',serif;font-size:1.5rem;margin-bottom:6px}
.page-sub{color:var(--ink2);font-size:.84rem;margin-bottom:24px}
/* フィルタバー */
.filter-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:#fff;padding:16px 20px;border-radius:10px;border:1px solid var(--border);margin-bottom:24px}
.filter-bar label{font-size:.78rem;font-weight:700;color:var(--ink2)}
.filter-bar select,.filter-bar input{padding:7px 12px;border:2px solid var(--border);border-radius:7px;font-size:.84rem;font-family:'Noto Sans JP',sans-serif;background:var(--paper)}
.filter-bar select:focus,.filter-bar input:focus{outline:none;border-color:var(--green2)}
.filter-sep{flex:1}
.btn-export{padding:7px 18px;border-radius:7px;border:2px solid var(--border);background:#fff;font-size:.8rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;color:var(--ink);transition:all .2s}
.btn-export:hover{background:var(--warm)}
/* サマリカード */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.sum-card{background:#fff;border-radius:12px;padding:20px;text-align:center;border:1px solid var(--border)}
.sum-lbl{font-size:.72rem;color:var(--ink2);margin-bottom:6px;font-weight:500}
.sum-val{font-size:2rem;font-weight:700;font-family:'Shippori Mincho',serif;line-height:1.1}
.sum-pct{font-size:.72rem;color:var(--ink2);margin-top:3px}
.sum-card.hi .sum-val{color:var(--red)}
.sum-card.mi .sum-val{color:var(--warn)}
.sum-card.lo .sum-val{color:var(--green)}
/* セクション */
.section{background:#fff;border-radius:12px;padding:24px;border:1px solid var(--border);margin-bottom:18px}
.sec-title{font-family:'Shippori Mincho',serif;font-size:1.05rem;font-weight:600;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--warm)}
/* 個人一覧 */
table{width:100%;border-collapse:collapse;font-size:.84rem}
th{text-align:left;padding:9px 12px;background:var(--warm);font-size:.75rem;color:var(--ink2);font-weight:700;border-bottom:2px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafffe}
.badge{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 10px;border-radius:10px}
.badge.high{background:#fde8e8;color:var(--red)}
.badge.mid{background:var(--warn2);color:var(--warn)}
.badge.low{background:var(--green3);color:var(--green)}
.empty{text-align:center;padding:40px;color:var(--ink2);font-size:.86rem}
.loading{text-align:center;padding:60px;color:var(--ink2)}
/* 集団分析 */
.ga-intro{font-size:.76rem;color:var(--ink2);background:var(--warm);border-radius:7px;padding:10px 14px;margin-bottom:16px;line-height:1.7}
.ga-intro strong{font-weight:700;color:var(--ink)}
.deviation-note{font-size:.76rem;color:var(--ink2);background:var(--warm);border-radius:7px;padding:8px 14px;margin-bottom:16px;display:inline-block}
.stress-bar-wrap{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:18px}
.stress-bar{display:flex;height:14px;border-radius:7px;overflow:hidden;margin-bottom:8px}
.stress-legend{display:flex;gap:16px;font-size:.76rem;color:var(--ink2);flex-wrap:wrap}
.sl-item{display:flex;align-items:center;gap:4px}
.sl-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
/* グループブロック */
.group-block{border-radius:10px;padding:16px 18px;margin-bottom:18px;border:1px solid}
.group-stressor{background:#FFF8F0;border-color:#FAC775}
.group-resource{background:#F2F8EE;border-color:#C0DD97}
.group-reaction{background:#F0F4FA;border-color:#B5D4F4}
.group-header{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.group-num{font-size:1.2rem;font-weight:700;flex-shrink:0;line-height:1}
.group-title{font-size:.9rem;font-weight:700;flex-shrink:0}
.group-title-sub{font-size:.76rem;color:var(--ink2);line-height:1.6;flex:1;min-width:160px}
.cat-block{margin-bottom:20px}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.cat-badge-ga{font-size:.84rem;font-weight:700;padding:5px 14px;border-radius:8px;background:var(--warm);color:var(--ink);border:1px solid var(--border)}
.cat-subtotal-ga{font-size:.76rem;font-weight:700;padding:3px 10px;border-radius:8px}
.cat-desc-ga{font-size:.76rem;color:var(--ink2);margin-bottom:8px;line-height:1.6}
.ga-header-row{display:flex;align-items:flex-end;gap:12px;margin-bottom:4px;padding-left:8px}
.ga-header-name{width:175px;flex-shrink:0;font-size:.72rem;color:var(--ink2)}
.ga-header-chart{width:280px;flex-shrink:0;font-size:.7rem;color:var(--ink2);display:flex;justify-content:space-between;position:relative;padding:0 2px}
.ga-header-nat{position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap}
.ga-header-desc{flex:1;font-size:.72rem;color:var(--ink2)}
.ga-scale-row{display:flex;align-items:center;gap:12px;margin-bottom:9px;border-radius:8px;padding:4px 8px;border-left:3px solid transparent}
.ga-scale-row.danger{border-left-color:#b5373a}
.ga-col-name{width:175px;flex-shrink:0;font-size:.78rem;font-weight:500;color:var(--ink);line-height:1.4}
.ga-col-name.private{color:var(--ink2);font-weight:400}
.ga-col-chart{width:280px;flex-shrink:0}
.ga-bar-track{width:100%;height:11px;background:var(--warm);border-radius:6px;position:relative;overflow:visible}
.ga-bar-fill{height:11px;border-radius:6px;position:absolute;left:0;top:0}
.ga-nat-line{position:absolute;top:-4px;width:2px;height:19px;background:var(--ink2);border-radius:1px}
.ga-axis-row{display:flex;justify-content:space-between;margin-top:2px;font-size:.68rem;color:var(--ink2)}
.ga-col-desc{flex:1;font-size:.74rem;color:var(--ink2);line-height:1.5;padding:4px 6px;border-radius:6px}
.ga-col-desc.danger-bg{background:#fde8e8;color:var(--red)}
/* 印刷ボタン */
.print-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.btn-print{padding:8px 18px;border-radius:7px;border:2px solid var(--border);background:#fff;font-size:.8rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;color:var(--ink);transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-print:hover{background:var(--warm)}
.btn-print.primary{border-color:var(--green);color:var(--green)}
.btn-print.primary:hover{background:var(--green3)}
/* 印刷スタイル */
@media print{
  @page{size:A4 portrait;margin:14mm 16mm}
  .hd,.filter-bar,.print-bar,.details-toggle,.details-body,.btn-logout,.no-print{display:none!important}
  body{background:#fff;color:#000;-webkit-print-color-adjust:exact;print-color-adjust:exact;font-size:10px}
  .main{margin:0;padding:0;max-width:100%}
  .page-title{font-size:.95rem;margin-bottom:2px}
  .page-sub{margin-bottom:6px;font-size:.75rem}
  .ga-intro{font-size:.7rem;padding:5px 9px;margin-bottom:6px;-webkit-print-color-adjust:exact;print-color-adjust:exact;line-height:1.5}
  .summary-grid{grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:6px}
  .sum-card{padding:7px 9px;border:1px solid #ccc;break-inside:avoid}
  .sum-lbl{font-size:.65rem}
  .sum-val{font-size:1.3rem}
  .sum-pct{font-size:.65rem}
  .warn-note{padding:4px 9px;margin-bottom:6px;font-size:.68rem;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .stress-bar-wrap{padding:7px 10px;margin-bottom:8px;border:1px solid #ccc;break-inside:avoid;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .stress-bar{height:9px;margin:3px 0}
  .stress-bar div{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .stress-legend{font-size:.65rem;gap:8px}
  .deviation-note{font-size:.68rem;padding:4px 9px;margin-bottom:8px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .group-block{border:1px solid #ccc!important;margin-bottom:8px;padding:8px 10px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .group-stressor,.group-resource,.group-reaction{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .group-header{margin-bottom:5px;gap:7px}
  .group-num{font-size:.95rem}
  .group-title{font-size:.78rem}
  .group-title-sub{font-size:.67rem;min-width:120px}
  .cat-block{margin-bottom:6px}
  .cat-badge-ga{font-size:.7rem;padding:2px 7px}
  .cat-subtotal-ga{font-size:.67rem;padding:2px 6px}
  .cat-desc-ga{font-size:.67rem;margin-bottom:3px;line-height:1.4}
  .ga-header-row{margin-bottom:2px;padding-left:4px}
  .ga-header-name{width:130px}
  .ga-header-chart{width:220px;font-size:.6rem}
  .ga-scale-row{break-inside:avoid;margin-bottom:3px;padding:1px 3px}
  .ga-col-name{width:130px;font-size:.68rem}
  .ga-col-chart{width:220px}
  .ga-bar-track{height:8px}
  .ga-bar-fill{height:8px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .ga-nat-line{height:15px;top:-3px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .ga-axis-row{font-size:.6rem;margin-top:1px}
  .ga-col-desc{font-size:.65rem;padding:1px 4px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .ga-col-desc.danger-bg{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .sl-dot{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
@media(max-width:640px){.summary-grid{grid-template-columns:repeat(2,1fr)}.filter-bar{flex-direction:column;align-items:stretch}.ga-scale-row{flex-wrap:wrap}.ga-col-name{width:100%}.ga-col-chart{width:100%}.ga-header-row{display:none}.group-header{flex-direction:column;gap:4px}}
</style>
</head>
<body>
<header class="hd">
  <div class="hd-logo">職業性ストレス<span>簡易調査票</span></div>
  <nav class="hd-nav">
    <a href="links.html">招待URL</a>
    <a href="dashboard.html" class="active">集計・結果</a>
  </nav>
  <span class="hd-user" id="hdEmail"></span>
  <button class="btn-logout" id="btnLogout">ログアウト</button>
</header>

<main class="main">
  <div class="page-title">集計・結果</div>
  <p class="page-sub">回答済み従業員のストレスチェック結果を集計します。</p>

  <div id="mainContent"><div class="loading">データを読み込んでいます...</div></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/questions.js"></script>
<script>
var allData         = [];   // { response + employee }
var deptList        = [];
var companyId       = null;
var totalEmployees  = 0;

// ============================================================
// 認証チェック & 初期ロード
// ============================================================
(async function() {
  var s = await supabase.auth.getSession();
  if (!s.data.session) { window.location.href = 'login.html'; return; }
  document.getElementById('hdEmail').textContent = s.data.session.user.email;

  var au = await supabase.from('admin_users').select('company_id').single();
  if (!au.data) { window.location.href = 'login.html'; return; }
  companyId = au.data.company_id;
  await loadData();
})();

document.getElementById('btnLogout').addEventListener('click', async function() {
  await supabase.auth.signOut();
  window.location.href = 'login.html';
});

// ============================================================
// データ取得
// ============================================================
async function loadData() {
  var [res, empRes] = await Promise.all([
    supabase
      .from('survey_responses')
      .select('id, answers, stress_level, s_total, s_max, r_total, r_max, o_total, o_max, completed_at, employees(department)')
      .eq('company_id', companyId)
      .order('completed_at', { ascending: false }),
    supabase
      .from('employees')
      .select('id', { count: 'exact', head: true })
      .eq('company_id', companyId)
  ]);

  if (res.error) { document.getElementById('mainContent').innerHTML = '<div class="empty">データ取得エラー: ' + res.error.message + '</div>'; return; }
  totalEmployees = empRes.count || 0;

  allData = (res.data || []).map(function(r) {
    return {
      id:           r.id,
      answers:      r.answers,
      stress_level: r.stress_level,
      s_total: r.s_total, s_max: r.s_max,
      r_total: r.r_total, r_max: r.r_max,
      o_total: r.o_total, o_max: r.o_max,
      completed_at: r.completed_at,
      department:   r.employees ? (r.employees.department || '未設定') : '未設定'
    };
  });

  deptList = Array.from(new Set(allData.map(function(d){ return d.department; }))).sort();
  renderPage(allData);
}

// ============================================================
// ページ描画
// ============================================================
function renderPage(data) {
  var deptOptions = '<option value="">全部署</option>' + deptList.map(function(d){
    return '<option value="' + escHtml(d) + '">' + escHtml(d) + '</option>';
  }).join('');

  var html = '';

  // フィルタバー
  html += '<div class="filter-bar">'
    + '<label>部署</label><select id="deptFilter">' + deptOptions + '</select>'
    + '<label style="margin-left:8px">期間（開始）</label><input type="date" id="dateFrom">'
    + '<label>〜</label><input type="date" id="dateTo">'
    + '<div class="filter-sep"></div>'
    + '</div>';

  // 印刷ボタン
  html += '<div class="print-bar no-print">'
    + '<button class="btn-print primary" onclick="printResults()">🖨 結果を印刷</button>'
    + '</div>';

  if (data.length === 0) {
    html += '<div class="section"><div class="empty">まだ回答データがありません。<br>招待URLを発行して従業員に配布してください。</div></div>';
    document.getElementById('mainContent').innerHTML = html;
    bindFilters();
    return;
  }

  var hi = data.filter(function(d){ return d.stress_level === 'high'; }).length;
  var mi = data.filter(function(d){ return d.stress_level === 'mid';  }).length;
  var lo = data.filter(function(d){ return d.stress_level === 'low';  }).length;
  var n  = data.length;
  var hiPct = n ? (hi/n*100).toFixed(1) : 0;

  // イントロ説明
  html += '<div class="ga-intro">ストレスチェックは <strong>① 仕事の負担</strong>・<strong>② 職場のリソース</strong>・<strong>③ 個人の反応と状態</strong> の3つの視点で職場環境を分析します。①の負担が高くても②のリソースが充実していれば影響は緩和されます。③に問題が出ている場合は①②の改善が優先課題です。</div>';

  // サマリカード（4枚、5人未満は回答者数のみ）
  var miPct0 = n ? (mi/n*100).toFixed(1) : '0.0';
  var loPct0 = n ? (lo/n*100).toFixed(1) : '0.0';
  if (n < 5) {
    html += '<div class="summary-grid" style="grid-template-columns:1fr;max-width:200px">'
      + '<div class="sum-card"><div class="sum-lbl">回答者数</div><div class="sum-val">' + n + '名</div></div>'
      + '</div>';
  } else {
    html += '<div class="summary-grid">'
      + '<div class="sum-card"><div class="sum-lbl">回答者数</div><div class="sum-val">' + n + '名</div></div>'
      + '<div class="sum-card hi"><div class="sum-lbl">高ストレス</div><div class="sum-val">' + hi + '名</div><div class="sum-pct">（' + hiPct + '%）</div></div>'
      + '<div class="sum-card mi"><div class="sum-lbl">中程度</div><div class="sum-val">' + mi + '名</div><div class="sum-pct">（' + miPct0 + '%）</div></div>'
      + '<div class="sum-card lo"><div class="sum-lbl">低ストレス</div><div class="sum-val">' + lo + '名</div><div class="sum-pct">（' + loPct0 + '%）</div></div>'
      + '</div>';
  }

  var MIN_GROUP = 5;

  // 不利益取扱い禁止の注意書き
  html += '<div style="font-size:.75rem;color:#854F0B;background:#fff3e0;border:1px solid #e8d5b0;border-radius:7px;padding:10px 14px;margin-bottom:18px;line-height:1.6;">'
    + '⚠️ 集団分析結果を、特定の個人への人事評価や不利益な取扱いの根拠として使用することは法律で禁止されています。'
    + '</div>';

  // ストレスレベル分布
  if (n < MIN_GROUP) {
    html += '<div class="section"><div class="sec-title">ストレスレベル分布</div>'
      + '<div class="empty" style="padding:28px 0">集団分析には5人以上のデータが必要です（現在 ' + n + ' 名）</div></div>';
  } else {
    var hiPct2 = (hi/n*100).toFixed(1);
    var miPct  = (mi/n*100).toFixed(1);
    var loPct  = (lo/n*100).toFixed(1);
    html += '<div class="stress-bar-wrap">'
      + '<div style="font-size:.8rem;color:var(--ink2);margin-bottom:8px">ストレスレベル分布</div>'
      + '<div class="stress-bar">'
      + '<div style="width:' + hiPct2 + '%;background:#E24B4A"></div>'
      + '<div style="width:' + miPct + '%;background:#EF9F27"></div>'
      + '<div style="width:' + loPct + '%;background:#378ADD"></div>'
      + '</div>'
      + '<div class="stress-legend">'
      + '<span class="sl-item"><span class="sl-dot" style="background:#E24B4A"></span>高ストレス ' + hi + '名（' + hiPct2 + '%）</span>'
      + '<span class="sl-item"><span class="sl-dot" style="background:#EF9F27"></span>中程度 ' + mi + '名（' + miPct + '%）</span>'
      + '<span class="sl-item"><span class="sl-dot" style="background:#378ADD"></span>低ストレス ' + lo + '名（' + loPct + '%）</span>'
      + '</div>'
      + '</div>';
  }

  // 集団分析
  if (n < MIN_GROUP) {
    html += '<div class="section"><div class="sec-title">集団分析（偏差値グラフ）</div>'
      + '<div class="empty" style="padding:28px 0">集団分析には5人以上のデータが必要です（現在 ' + n + ' 名）</div></div>';
  } else {
    html += '<div class="deviation-note">偏差値は全国平均を50として算出しています。50より高い＝全国より上、低い＝全国より下を示します。</div>';
    html += '<div class="group-analysis-area">';
    html += renderGroupAnalysis(data);
    html += '</div>';
  }

  document.getElementById('mainContent').innerHTML = html;
  bindFilters();
}

// ============================================================
// 集団分析（偏差値グラフ）
// ============================================================
function renderGroupAnalysis(data) {
  if (data.length === 0) return '';

  var SC='#378ADD', WC='#EF9F27', DC='#E24B4A';
  var SB='#E6F1FB', SF='#185FA5', WB='#FAEEDA', WF='#854F0B', DB='#FCEBEB', DF='#A32D2D';

  function getStatus(dev, negHigh) {
    var over = negHigh ? dev > 50 : dev < 50;
    if (!over) return { c:SC, bg:SB, fg:SF, mark:'〇', text:'安全', danger:false };
    var diff = negHigh ? dev - 50 : 50 - dev;
    if (diff >= 10) return { c:DC, bg:DB, fg:DF, mark:'✕', text:'危険', danger:true };
    return { c:WC, bg:WB, fg:WF, mark:'△', text:'注意', danger:false };
  }

  // QUESTIONS から尺度ごとの自社平均を集計
  var scaleMap = {};
  QUESTIONS.forEach(function(q) {
    var key = q.scale.trim();
    if (!scaleMap[key]) scaleMap[key] = { questions:[], nationalAvg:q.avg, sd:q.sd, category:q.category };
    scaleMap[key].questions.push(q);
  });

  var scaleAvg = {};
  Object.keys(scaleMap).forEach(function(key) {

  var minD = 30, maxD = 70;
  function dw(dev) { return (Math.max(minD, Math.min(maxD, dev)) - minD) / (maxD - minD) * 100; }

  // QUESTIONS から尺度名→平均値のマップを作成（questions.jsを使って集計）
  var scaleNameMap = {};
  Object.keys(scaleMap).forEach(function(key) {
    var shortName = key.replace(/^[\d\.\-]+\s*/, '').trim();

      catIndexes:[4,5,6] }

  var html = '';
  for (var gi = 0; gi < groups.length; gi++) {
    var grp = groups[gi];
    html += '<div class="group-block ' + grp.cls + '">'

        var ist = isPrivate ? { c:'#aaa', bg:'', fg:'', mark:'', text:'', danger:false } : getStatus(dv2, cat.negHigh);

          + '<div class="ga-axis-row"><span>30</span><span>' + dvStr + '</span><span>70</span></div>'

          + '<div class="ga-col-desc' + (ist.danger ? ' danger-bg' : '') + '">' + escHtml(desc2) + '</div>'

      }
      html += '</div>'; // cat-block
    }
    html += '</div>'; // group-block
  }
  return html;

// ============================================================
// フィルタ
// ============================================================
function bindFilters() {
  var deptSel  = document.getElementById('deptFilter');
  var dateFrom = document.getElementById('dateFrom');
  var dateTo   = document.getElementById('dateTo');
  if (!deptSel) return;

  function applyFilter() {
    var dept = deptSel.value;
    var from = dateFrom.value ? new Date(dateFrom.value) : null;
    var to   = dateTo.value   ? new Date(dateTo.value + 'T23:59:59') : null;
    var filtered = allData.filter(function(d) {
      if (dept && d.department !== dept) return false;
      if (from && new Date(d.completed_at) < from) return false;
      if (to   && new Date(d.completed_at) > to)   return false;
      return true;
    });
    renderPage(filtered);
    // フィルタ値を復元
    document.getElementById('deptFilter').value = dept;
    if (from) document.getElementById('dateFrom').value = dateFrom.value;
    if (to)   document.getElementById('dateTo').value   = dateTo.value;
  }

  deptSel.addEventListener('change', applyFilter);
  dateFrom.addEventListener('change', applyFilter);
  dateTo.addEventListener('change', applyFilter);
}

}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
