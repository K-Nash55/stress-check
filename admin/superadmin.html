<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スーパーアドミン</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; font-family: 'Segoe UI', 'Noto Sans JP', sans-serif; font-size: 13px; background: #f0f2f5; color: #222; }

/* ── ヘッダー ── */
.header { background: #1a1a2e; color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
.badge { background: #e74c3c; color: #fff; font-size: 11px; font-weight: bold; padding: 3px 8px; border-radius: 4px; letter-spacing: 1px; }
.header h1 { margin: 0; font-size: 18px; flex: 1; }
.test-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
.test-btn { padding: 5px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; }
.test-btn.neg1  { background: #e74c3c; color: #fff; }
.test-btn.neg2  { background: #e67e22; color: #fff; }
.test-btn.pos3  { background: #2980b9; color: #fff; }
.test-btn.pos4  { background: #27ae60; color: #fff; }
.test-btn.rand  { background: #8e44ad; color: #fff; }

/* ── セクション ── */
.section { background: #fff; border-radius: 8px; margin: 16px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
.section h2 { margin: 0 0 12px; font-size: 14px; color: #333; border-bottom: 2px solid #e0e0e0; padding-bottom: 6px; }

/* ── テーブル共通 ── */
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: #1a1a2e; color: #fff; padding: 6px 8px; text-align: left; font-weight: normal; white-space: nowrap; position: sticky; top: 52px; }
td { padding: 5px 8px; border-bottom: 1px solid #eee; vertical-align: top; }
tr:last-child td { border-bottom: none; }

/* グループヘッダー */
tr.big-cat td  { background: #2c3e50; color: #fff; font-weight: bold; font-size: 11px; padding: 5px 8px; }
tr.mid-cat td  { background: #ecf0f1; color: #555; font-size: 11px; padding: 4px 8px; font-weight: bold; }
tr.area-hd td  { background: #34495e; color: #fff; font-weight: bold; font-size: 11px; padding: 5px 8px; }
tr.total-row td { background: #1a1a2e; color: #fff; font-weight: bold; }

/* 数値列 */
td.num { text-align: right; }

/* 色判定 */
td.dev-blue   { color: #2980b9; font-weight: bold; }
td.dev-yellow { color: #e67e22; font-weight: bold; }
td.dev-red    { color: #e74c3c; font-weight: bold; }

/* ブロック④ 判定ボックス */
.result-block { padding: 4px 0; line-height: 2; }
.result-block .row { display: flex; gap: 12px; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
.result-block .row:last-child { border-bottom: none; }
.result-block .lbl { color: #888; min-width: 160px; font-size: 12px; }
.result-block .val { font-weight: bold; font-size: 13px; }
.result-block .val.high { color: #e74c3c; }
.result-block .val.mid  { color: #e67e22; }
.result-block .val.low  { color: #27ae60; }

.code-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 12px; }
.code-table th { background: #2c3e50; color: #fff; padding: 5px 8px; }
.code-table td { padding: 5px 8px; border-bottom: 1px solid #eee; }
.code-table tr.current td { background: #fde8e8; font-weight: bold; }

.rule-text { background: #f8f9fa; border-radius: 6px; padding: 12px 16px; font-size: 12px; line-height: 2; color: #444; white-space: pre-line; margin-bottom: 12px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/scoring.js"></script>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <span class="badge">SUPER ADMIN</span>
  <h1>スーパーアドミン</h1>
  <div class="test-buttons">
    <button class="test-btn neg1" onclick="runTest(1)">全ネガ (1)</button>
    <button class="test-btn neg2" onclick="runTest(2)">ややネガ (2)</button>
    <button class="test-btn pos3" onclick="runTest(3)">ややポジ (3)</button>
    <button class="test-btn pos4" onclick="runTest(4)">全ポジ (4)</button>
    <button class="test-btn rand" onclick="runTest('random')">ランダム</button>
  </div>
</div>

<!-- ブロック① 全141問回答一覧 -->
<div class="section">
  <h2>① 全141問 回答一覧</h2>
  <div id="block1"></div>
</div>

<!-- ブロック② スケール偏差値テーブル -->
<div class="section">
  <h2>② スケール偏差値テーブル（49スケール）</h2>
  <div id="block2"></div>
</div>

<!-- ブロック③ 高ストレス判定用57問 -->
<div class="section">
  <h2>③ 高ストレス判定用 57問テーブル</h2>
  <div id="block3"></div>
</div>

<!-- ブロック④ 高ストレス判定ボックス -->
<div class="section">
  <h2>④ 高ストレス判定ボックス</h2>
  <div id="block4"></div>
</div>

<script>
// ─── 状態 ───────────────────────────────────
var master = null;
var answers = {};

// ─── テストデータ生成 ─────────────────────────
async function runTest(score) {
  if (!master) master = await loadMaster();
  answers = {};
  master.questions.forEach(function(q) {
    answers[q.q141] = score === 'random' ? Math.floor(Math.random() * 4) + 1 : score;
  });
  buildAll();
}

// ─── ブロック① ──────────────────────────────
function buildBlock1(answers, questions) {
  var html = '<table>'
    + '<thead><tr>'
    + '<th>No</th><th>カテゴリ</th><th>スケール</th>'
    + '<th>質問文</th><th>回答</th><th>direction</th><th>素点</th>'
    + '</tr></thead><tbody>';

  questions.forEach(function(q) {
    var choiceIndex = answers[q.q141] || 0;
    var rawScore = calcRawScore(choiceIndex, q.direction);
    var choices = q.choices ? q.choices.split(' ') : [];
    var choiceLabel = choices[choiceIndex - 1] || '-';

    html += '<tr>'
      + '<td class="num">' + q.q141 + '</td>'
      + '<td>' + (q.category || '') + '</td>'
      + '<td>' + cleanScaleName(q.scale_name) + '</td>'
      + '<td style="max-width:360px">' + (q.question || '') + '</td>'
      + '<td>' + choiceLabel + ' (' + choiceIndex + ')</td>'
      + '<td class="num">' + q.direction + '</td>'
      + '<td class="num">' + rawScore + '</td>'
      + '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('block1').innerHTML = html;
}

// ─── ブロック② ──────────────────────────────
function buildBlock2(scaleResults, deviations) {
  var html = '<table>'
    + '<thead><tr>'
    + '<th>スケール</th><th>素点平均</th>'
    + '<th>全国平均</th><th>SD</th><th>偏差値</th>'
    + '</tr></thead><tbody>';

  master.scales.forEach(function(s) {
    var name = cleanScaleName(s.scale_name);
    var d = deviations[name];
    if (!d) return;
    var cls = 'dev-' + getDevColor(d.dev);
    html += '<tr>'
      + '<td>' + name + '</td>'
      + '<td class="num">' + (d.avg ? d.avg.toFixed(2) : '-') + '</td>'
      + '<td class="num">' + (s.scale_avg ? s.scale_avg.toFixed(2) : '-') + '</td>'
      + '<td class="num">' + (s.scale_sd ? s.scale_sd.toFixed(2) : '-') + '</td>'
      + '<td class="num ' + cls + '">' + d.dev.toFixed(1) + '</td>'
      + '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('block2').innerHTML = html;
}

// ─── ブロック③ ──────────────────────────────
function buildBlock3(deviations, level) {
  var groups = [
    {
      label: 'ストレス反応',
      items: ['活気', 'イライラ感', '疲労感', '不安感', '抑うつ感', '身体愁訴']
    },
    {
      label: 'ストレッサー',
      items: [
        '仕事の量的負担', '仕事の質的負担', '身体的負担度',
        '職場での対人関係', '職場環境', '情緒的負担',
        '役割葛藤', 'ワーク・セルフ・バランス（ネガティブ）'
      ]
    },
    {
      label: 'リソース',
      items: null
    }
  ];

  var usedItems = groups[0].items.concat(groups[1].items);
  groups[2].items = Object.keys(deviations).filter(function(k) {
    return usedItems.indexOf(k) === -1;
  }).sort();

  var html = '<table>'
    + '<thead><tr>'
    + '<th>グループ</th><th>スケール</th>'
    + '<th>素点平均</th><th>偏差値</th>'
    + '</tr></thead><tbody>';

  groups.forEach(function(g) {
    var sum = 0, count = 0;
    html += '<tr class="area-hd"><td colspan="4">' + g.label + '</td></tr>';
    g.items.forEach(function(name) {
      var d = deviations[name];
      if (!d) return;
      var cls = 'dev-' + getDevColor(d.dev);
      html += '<tr>'
        + '<td></td>'
        + '<td>' + name + '</td>'
        + '<td class="num">' + d.avg.toFixed(2) + '</td>'
        + '<td class="num ' + cls + '">' + d.dev.toFixed(1) + '</td>'
        + '</tr>';
      sum += d.dev;
      count++;
    });
    if (count > 0) {
      html += '<tr class="total-row">'
        + '<td colspan="2">平均偏差値</td>'
        + '<td></td>'
        + '<td class="num">' + (sum / count).toFixed(1) + '</td>'
        + '</tr>';
    }
  });

  html += '</tbody></table>';
  document.getElementById('block3').innerHTML = html;
}

// ─── ブロック④ ──────────────────────────────
function buildBlock4(deviations, level) {
  var labels = { high: '高ストレス', mid: 'やや高いストレス', low: '通常' };
  document.getElementById('block4').innerHTML =
    '<div class="result-block">'
    + '<div class="row"><span class="lbl">判定</span>'
    + '<span class="val ' + level + '">' + (labels[level] || level) + '</span></div>'
    + '</div>';
}

// ─── メイン ─────────────────────────────────
function buildAll() {
  var scaleResults = calcScaleResults(answers, master.questions);
  var deviations   = calcAllDeviations(scaleResults, master.scales);
  var level        = getStressLevel(deviations);

  buildBlock1(answers, master.questions);
  buildBlock2(scaleResults, deviations);
  buildBlock3(deviations, level);
  buildBlock4(deviations, level);
}

// ─── 初期化 ─────────────────────────────────
async function init() {
  master = await loadMaster();

  var stored = sessionStorage.getItem('stressResult');
  if (stored) {
    var data = JSON.parse(stored);
    answers = data.answers;
    buildAll();
    return;
  }

  var result = await supabase
    .from('survey_responses')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(1);

  if (result.data && result.data.length > 0) {
    answers = result.data[0].answers;
    buildAll();
    return;
  }

  master.questions.forEach(function(q) {
    answers[q.q141] = 4;
  });
  buildAll();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
