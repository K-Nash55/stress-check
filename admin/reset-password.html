<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワード再設定 | ストレスチェック</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;600&display=swap');
:root{--ink:#1a1a2e;--ink2:#4a4a6a;--paper:#faf9f6;--green:#2d6a4f;--green2:#52b788;--border:#d6d0c4;--red:#b5373a;--sh:rgba(26,26,46,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.wrap{width:100%;max-width:420px;padding:0 20px}
.logo{text-align:center;margin-bottom:32px}
.logo-text{font-family:'Shippori Mincho',serif;font-size:1.3rem;font-weight:600}.logo-text span{color:var(--green2)}
.logo-sub{font-size:.75rem;color:var(--ink2);margin-top:4px;letter-spacing:.05em}
.card{background:#fff;border-radius:14px;padding:36px;box-shadow:0 4px 24px var(--sh);border:1px solid var(--border)}
.card-title{font-size:1rem;font-weight:700;margin-bottom:8px;text-align:center;color:var(--ink)}
.card-desc{font-size:.8rem;color:var(--ink2);text-align:center;margin-bottom:24px;line-height:1.7}
.field{margin-bottom:16px}
.field label{display:block;font-size:.78rem;font-weight:700;margin-bottom:5px;color:var(--ink2)}
.field input{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:8px;font-size:.9rem;font-family:'Noto Sans JP',sans-serif;background:var(--paper);transition:border-color .2s}
.field input:focus{outline:none;border-color:var(--green2)}
.btn{display:block;width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-top:8px;transition:all .2s}
.btn:hover:not(:disabled){background:#1b5e3f}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{color:var(--red);font-size:.8rem;margin-top:10px;text-align:center;display:none}
.success{text-align:center;padding:8px 0;display:none}
.success-icon{font-size:2.4rem;margin-bottom:12px}
.success-title{font-family:'Shippori Mincho',serif;font-size:1.2rem;margin-bottom:10px}
.success-desc{font-size:.84rem;color:var(--ink2);line-height:1.8}
.loading{text-align:center;padding:40px 0;color:var(--ink2);font-size:.88rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-text">職業性ストレス<span>簡易調査票</span></div>
    <div class="logo-sub">管理者ポータル</div>
  </div>

  <!-- トークン検証中 -->
  <div class="card" id="cardLoading">
    <div class="loading">確認中...</div>
  </div>

  <!-- 新パスワード入力フォーム -->
  <div class="card" id="cardForm" style="display:none">
    <div class="card-title">パスワード再設定</div>
    <p class="card-desc">新しいパスワードを入力してください。</p>
    <div class="field">
      <label>新しいパスワード（8文字以上）</label>
      <input type="password" id="newPassword" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div class="field">
      <label>新しいパスワード（確認）</label>
      <input type="password" id="newPasswordConfirm" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="btn" id="btnUpdate">パスワードを更新する</button>
    <div class="err" id="formErr"></div>
  </div>

  <!-- 更新完了 -->
  <div class="card" id="cardSuccess" style="display:none">
    <div class="success" style="display:block">
      <div class="success-icon">✅</div>
      <div class="success-title">パスワードを更新しました</div>
      <div class="success-desc">
        新しいパスワードでログインしてください。<br><br>
        <a href="login.html" style="color:var(--green);font-weight:700">ログインページへ →</a>
      </div>
    </div>
  </div>

  <!-- 無効なリンク -->
  <div class="card" id="cardInvalid" style="display:none">
    <div class="success" style="display:block">
      <div class="success-icon">⚠️</div>
      <div class="success-title">リンクが無効です</div>
      <div class="success-desc">
        このリンクは期限切れか無効です。<br>
        再度パスワードリセットをリクエストしてください。<br><br>
        <a href="login.html" style="color:var(--green);font-weight:700">ログインページへ →</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script>
function showCard(id) {
  ['cardLoading','cardForm','cardSuccess','cardInvalid'].forEach(function(c) {
    document.getElementById(c).style.display = c === id ? 'block' : 'none';
  });
}

// Supabase v2 はページロード時にハッシュのトークンを自動処理し
// PASSWORD_RECOVERY イベントを発火する
supabase.auth.onAuthStateChange(function(event, session) {
  if (event === 'PASSWORD_RECOVERY') {
    showCard('cardForm');
  }
});

// フォールバック：getSession() でリカバリーセッションを確認
// （onAuthStateChange が発火しないブラウザ環境向け）
window.addEventListener('load', async function() {
  var hash = window.location.hash;
  if (!hash || hash.indexOf('type=recovery') === -1) {
    // ハッシュにトークンがない場合は無効表示（少し待って onAuthStateChange を優先）
    setTimeout(function() {
      if (document.getElementById('cardForm').style.display === 'none') {
        showCard('cardInvalid');
      }
    }, 1500);
    return;
  }
  // ハッシュあり：getSession() でセッション取得を試みる
  setTimeout(async function() {
    if (document.getElementById('cardForm').style.display !== 'none') return;
    var s = await supabase.auth.getSession();
    if (s.data && s.data.session) {
      showCard('cardForm');
    } else {
      showCard('cardInvalid');
    }
  }, 1500);
});

document.getElementById('btnUpdate').addEventListener('click', async function() {
  var pw      = document.getElementById('newPassword').value;
  var confirm = document.getElementById('newPasswordConfirm').value;
  var errEl   = document.getElementById('formErr');
  errEl.style.display = 'none';

  if (pw.length < 8)    { errEl.textContent = 'パスワードは8文字以上で入力してください'; errEl.style.display = 'block'; return; }
  if (pw !== confirm)   { errEl.textContent = 'パスワードが一致しません'; errEl.style.display = 'block'; return; }

  var btn = document.getElementById('btnUpdate');
  btn.disabled = true; btn.textContent = '更新中...';

  var res = await supabase.auth.updateUser({ password: pw });
  if (res.error) {
    errEl.textContent = '更新に失敗しました：' + res.error.message;
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'パスワードを更新する';
    return;
  }

  await supabase.auth.signOut();
  showCard('cardSuccess');
});

['newPassword','newPasswordConfirm'].forEach(function(id) {
  document.getElementById(id).addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('btnUpdate').click();
  });
});
</script>
</body>
</html>
